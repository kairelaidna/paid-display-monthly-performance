<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid Display Monthly Performance</title>
    <!-- Standalone Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wise: {
                            forest: '#163300',
                            fast: '#9FE870'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --wise-forest: #163300;
            --wise-fast: #9FE870;
            --brand-indigo: #4338ca;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9;
            -webkit-print-color-adjust: exact; 
        }

        .slide-container {
            width: 100%;
            max-width: 1400px;
            margin: 3rem auto;
            background: white;
            aspect-ratio: 16 / 9;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            border-radius: 2rem;
            position: relative;
            padding: 0.5cm; /* Exactly 0.5cm outer padding */
            overflow: hidden; 
        }

        @media print {
            @page { size: 1280px 720px; margin: 0; }
            html, body { background: white !important; padding: 0 !important; margin: 0 !important; height: auto !important; }
            .no-print { display: none !important; }
            .slide-container {
                margin: 0 !important;
                width: 1280px !important;
                height: 720px !important;
                max-width: none !important;
                page-break-after: always !important;
                break-after: page !important;
                page-break-inside: avoid !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                padding: 0.5cm !important; /* Exactly 0.5cm margin for PDF export */
            }
            .slide-container.last-slide {
                page-break-after: avoid !important;
                break-after: avoid !important;
            }
            
            /* Fix for PDF shadow artifacts causing grey boxes */
            * {
                box-shadow: none !important;
            }
            
            /* Clean up textareas for PDF export */
            textarea {
                overflow: hidden !important;
                resize: none !important;
                font-size: 11px !important;
                line-height: 1.4 !important;
            }

            textarea.plan-textarea {
                font-size: var(--plan-font-size, 11px) !important;
                line-height: var(--plan-line-height, 1.4) !important;
            }
            
            textarea[class*="text-lg"] {
                font-size: 14px !important;
                line-height: 1.6 !important;
            }
        }

        .animate-grow { animation: grow 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; transform-origin: left; scale: 0 1; }
        @keyframes grow { to { scale: 1 1; } }

        .plan-textarea {
            font-size: var(--plan-font-size, 13px);
            line-height: var(--plan-line-height, 1.6);
        }

        textarea::-webkit-scrollbar { width: 5px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="env" data-plugins="transform-react-jsx">
        const { useState, useMemo, useEffect } = React;

        // --- CONFIG & UTILS ---
        const APP_TITLE = 'Paid Display Monthly Performance';
        const LIGHTDASH_SHEET_ID = '1IOER5fHYosm7ZMLAqDd0RTWFL8om0lm9emelSwxCWvM';
        const PERFORMANCE_UPDATES_SHEET_ID = '15dr8wUNqMtE3VlQOHpczIbEWRk2z2sfpbwNWW8QVOYg';
        const APPS_SCRIPT_DATA_BRIDGE_URL = 'https://script.google.com/a/macros/wise.com/s/AKfycbyhHkA6OiR_5dA_dQXGDFNdm4RL10BVQMLUutiVpiH7Amp05Qj3lVI7N5eH501rMPJy/exec';
        const LOCAL_LIGHTDASH_CSV = 'data/lightdash.csv';
        const LOCAL_PERFORMANCE_UPDATES_CSV = 'data/performance-updates.csv';
        const OPENAI_SUMMARY_TIMEOUT_MS = 90000;
        const PAYBACK_OUTLIER_CAP = 50;
        const REGIONS = ['LATAM', 'NORTHAM', 'EUROPE', 'ASIA', 'PACIFIC', 'GBR', 'MEA'];
        const PLATFORM_SEQUENCE = [
            { key: 'GAC', statName: 'Google AC', displayName: 'Google AC', narrativeName: 'Google AC', logoUrl: './assets/google-ac-logo.png', fallback: 'G' },
            { key: 'MOLOCO', statName: 'Moloco', displayName: 'Moloco', narrativeName: 'Moloco', logoUrl: './assets/moloco-logo.png', fallback: 'M' },
            { key: 'TTD', statName: 'TTD', displayName: 'The Trade Desk', narrativeName: 'The Trade Desk', logoUrl: './assets/the-trade-desk-logo.png', fallback: 'TTD' },
            { key: 'AVOW', statName: 'Avow', displayName: 'Avow', narrativeName: 'Avow', fallback: 'A' }
        ];
        const REGIONAL_NARRATIVE_SEQUENCE = [PLATFORM_SEQUENCE[0], PLATFORM_SEQUENCE[2], PLATFORM_SEQUENCE[1]];
        const PLATFORMS_UI = PLATFORM_SEQUENCE.map(platform => platform.statName);
        const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        const safeNum = (v) => {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            const n = parseFloat(String(v).replace(/[^\d.-]/g, ''));
            return isNaN(n) ? 0 : n;
        };

        const fmtCurr = (v) => new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', minimumFractionDigits: 0 }).format(v);
        const fmtCompactNum = (v) => Intl.NumberFormat('en-GB', { notation: "compact", maximumFractionDigits: 1 }).format(v).toLowerCase();
        const fmtCompactCurr = (v) => "£" + Intl.NumberFormat('en-GB', { notation: "compact", maximumFractionDigits: 1 }).format(v).toLowerCase();
        
        const getMoName = (d) => {
            if (!d || d === "No Date") return "Performance Cycle";
            const parts = d.split('-');
            return parts.length > 1 ? MONTHS[parseInt(parts[1]) - 1] : d;
        };

        const formatCoverDate = (d) => {
            if (!d || d === "No Date") return "Performance Cycle";
            const parts = d.split('-');
            if (parts.length >= 2) {
                let yr = parts[0].length === 4 ? parts[0] : (parts[1].length === 4 ? parts[1] : '2026');
                let moIdx = parts[0].length === 4 ? parseInt(parts[1]) - 1 : parseInt(parts[0]) - 1;
                if (!isNaN(moIdx) && moIdx >= 0 && moIdx < 12) {
                    return `${MONTHS[moIdx].substring(0, 3)} ${yr}`;
                }
            }
            return d.length > 3 ? d.substring(0, 3) + " 2026" : d;
        };

        const getRegionSubtitle = (region) => {
            const map = {
                'LATAM': '🇧🇷',
                'NORTHAM': '🇺🇸 🇨🇦',
                'EUROPE': '🇪🇺',
                'ASIA': '🇲🇾 🇸🇬 🇯🇵 🇮🇩 🇵🇭',
                'PACIFIC': '🇦🇺 🇳🇿',
                'GBR': '🇬🇧',
                'MEA': '🇹🇷'
            };
            return map[region] || '';
        };

        const normalizePlatformLookup = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');

        const getPlatformMeta = (value) => {
            const key = normalizePlatformLookup(value);
            if (!key) return null;
            if (key.includes('gac') || key.includes('google') || key.includes('appcampaign')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'GAC');
            if (key.includes('ttd') || key.includes('tradedesk')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'TTD');
            if (key.includes('moloco')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'MOLOCO');
            if (key.includes('avow')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'AVOW');
            return PLATFORM_SEQUENCE.find(platform => normalizePlatformLookup(platform.statName) === key || platform.key.toLowerCase() === key) || null;
        };

        const parseCSVRows = (text, delimiter) => {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { field += '"'; i++; }
                    else if (char === '"') inQuotes = false;
                    else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === delimiter) { row.push(field); field = ''; }
                    else if (char === '\n' || char === '\r') {
                        row.push(field);
                        if (row.some(c => c.trim() !== '')) rows.push(row);
                        row = []; field = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else field += char;
                }
            }
            if (field || row.length > 0) { row.push(field); rows.push(row); }
            return rows;
        };

        const formatSheetValue = (value, formattedValue) => {
            if (value instanceof Date && !isNaN(value)) {
                const y = value.getFullYear();
                const m = String(value.getMonth() + 1).padStart(2, '0');
                const d = String(value.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            if (value === null || value === undefined) return '';
            if (typeof value === 'object') return formattedValue || '';
            return value;
        };

        const escapeCSV = (value) => {
            const text = String(value ?? '');
            return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
        };

        const sheetRowsToCSV = (rows) => rows.map(row => row.map(escapeCSV).join(',')).join('\n');

        const getBridgeSource = (spreadsheetId) => spreadsheetId === PERFORMANCE_UPDATES_SHEET_ID ? 'updates' : 'lightdash';

        const loadBridgePayload = (spreadsheetId, { sheetName = '', allTabs = false, months = [] } = {}) => new Promise((resolve, reject) => {
            const callbackName = `__wiseSheetCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
            const script = document.createElement('script');
            const sourceParam = `source=${encodeURIComponent(getBridgeSource(spreadsheetId))}`;
            const callbackParam = `callback=${encodeURIComponent(callbackName)}`;
            const sheetParam = sheetName ? `&sheet=${encodeURIComponent(sheetName)}` : '';
            const allTabsParam = allTabs ? '&allTabs=1' : '';
            const monthValues = Array.isArray(months) ? [...new Set(months.map(month => String(month || '').trim()).filter(Boolean))] : [];
            const monthsParam = monthValues.length ? `&months=${encodeURIComponent(monthValues.join(','))}` : '';
            const timeout = window.setTimeout(() => {
                cleanup();
                reject(new Error('The Wise data bridge did not respond. Check that you are signed into your Wise Google account and that the Apps Script deployment is active.'));
            }, 20000);

            const cleanup = () => {
                window.clearTimeout(timeout);
                delete window[callbackName];
                script.remove();
            };

            window[callbackName] = (response) => {
                cleanup();
                if (!response || !response.ok) {
                    const details = response?.error || 'The Wise data bridge returned an error.';
                    reject(new Error(details));
                    return;
                }
                resolve(response);
            };

            script.onerror = () => {
                cleanup();
                reject(new Error('The Wise data bridge could not be loaded. Open the Apps Script URL in this browser once and confirm you are signed into Wise Google.'));
            };

            script.src = `${APPS_SCRIPT_DATA_BRIDGE_URL}?${sourceParam}&${callbackParam}${sheetParam}${allTabsParam}${monthsParam}`;
            document.head.appendChild(script);
        });

        const loadGoogleSheetRows = async (spreadsheetId, sheetName) => {
            const payload = await loadBridgePayload(spreadsheetId, { sheetName });
            return payload.rows || [];
        };

        const loadLocalCSVRows = async (path) => {
            const embedded = path === LOCAL_LIGHTDASH_CSV
                ? window.WISE_CACHED_LIGHTDASH_CSV
                : (path === LOCAL_PERFORMANCE_UPDATES_CSV ? window.WISE_CACHED_PERFORMANCE_UPDATES_CSV : null);
            if (embedded) {
                const firstLine = embedded.split(/\r?\n/).find(line => line.trim()) || '';
                const delimiter = firstLine.includes(';') ? ';' : ',';
                return parseCSVRows(embedded.replace(/^\uFEFF/, ''), delimiter);
            }
            const response = await fetch(`${path}?v=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) throw new Error(`Could not load ${path}.`);
            const text = (await response.text()).replace(/^\uFEFF/, '');
            const firstLine = text.split(/\r?\n/).find(line => line.trim()) || '';
            const delimiter = firstLine.includes(';') ? ';' : ',';
            return parseCSVRows(text, delimiter);
        };

        const loadRowsFromGoogleOrCache = async (spreadsheetId, sheetName, fallbackPath) => {
            try {
                return { rows: await loadGoogleSheetRows(spreadsheetId, sheetName), source: 'Wise data bridge' };
            } catch (sheetError) {
                if (!fallbackPath) throw sheetError;
                const rows = await loadLocalCSVRows(fallbackPath);
                return { rows, source: 'cached data' };
            }
        };

        const Icons = {
            Chart: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20V10M18 20V4M6 20v-4"/></svg>,
            Upload: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,
            Zap: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            X: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 6 6 18M6 6l12 12"/></svg>,
            Loader: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="animate-spin" {...p}><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4"/></svg>,
            Info: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
            Globe: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
            Calendar: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            WiseLogo: (p) => <svg width="100%" height="100%" viewBox="0 0 32 24" fill="currentColor" {...p}><path d="M12.98 0L20.89 0L14.7 7.74H20.73L5.47 24L10.37 13.9H5.16L12.98 0Z"/></svg>
        };

        const PlatformLogo = ({ platform, size = 'medium', className = '' }) => {
            const meta = getPlatformMeta(platform);
            if (!meta) return null;
            const sizes = {
                small: 'h-7 w-7',
                medium: 'h-12 w-12',
                large: 'h-16 w-16'
            };
            const sizeClass = sizes[size] || sizes.medium;
            if (!meta.logoUrl) {
                return (
                    <div className={`${sizeClass} rounded-xl bg-slate-900 text-white flex items-center justify-center text-xs font-black tracking-tight shrink-0 ${className}`}>
                        {meta.fallback || meta.displayName?.charAt(0)}
                    </div>
                );
            }
            return (
                <img
                    src={meta.logoUrl}
                    alt={`${meta.displayName} logo`}
                    className={`${sizeClass} object-contain shrink-0 ${className}`}
                />
            );
        };

        const Badge = ({ val, label, inverse = false, metricType, rawVal }) => {
            if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
            const isPos = val > 0;
            let good = inverse ? !isPos : isPos;
            
            if (metricType === 'payback' && rawVal !== undefined) {
                const prev = rawVal / (1 + val);
                good = Math.abs(rawVal - 15) < Math.abs(prev - 15);
            }
            if (metricType === 'spend' || metricType === 'cm') good = isPos;

            return (
                <div className="flex flex-col items-center">
                    <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider ${good ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                        {isPos ? '↑' : '↓'} {Math.abs(val * 100).toFixed(0)}%
                    </span>
                    <span className="text-[7px] text-slate-400 font-black mt-0.5 uppercase tracking-tighter">{label}</span>
                </div>
            );
        };

        const MetricCard = ({ title, val, mom, yoy, inverse = false, rawVal, mainColor = 'text-wise-forest', labelColor = 'text-wise-forest/70' }) => {
            const formatPct = (v) => (Math.abs(v) * 100).toFixed(1) + '%';
            const getColor = (v) => {
                if (v === undefined || v === null || v === 0 || !isFinite(v)) return 'text-slate-400';
                let good = inverse ? v < 0 : v > 0;
                
                if (title === 'Payback' && rawVal !== undefined) {
                    const prev = rawVal / (1 + v);
                    good = Math.abs(rawVal - 15) < Math.abs(prev - 15);
                }
                if (title === 'Spend' || title === 'CM') good = v > 0; 
                
                return good ? 'text-green-600' : 'text-[#d32f2f]'; 
            };
            const getSign = (v) => (v > 0 ? '+' : v < 0 ? '-' : '');

            return (
                <div className="bg-[#f2f2f2] rounded-[1rem] py-1.5 px-1.5 flex flex-col justify-center items-center min-w-[95px] flex-1 text-center shadow-sm">
                    <span className={`${labelColor} font-bold text-[10px] uppercase tracking-widest mb-0.5`}>{title}</span>
                    <span className={`${mainColor} font-black text-2xl tracking-tighter mb-1 leading-none`}>{val}</span>
                    <div className="flex flex-col items-center gap-0 text-[8px] font-bold">
                        {mom !== undefined && (
                            <span className={getColor(mom)}>{getSign(mom)}{formatPct(mom)} MoM</span>
                        )}
                        {yoy !== undefined && (
                            <span className={getColor(yoy)}>{getSign(yoy)}{formatPct(yoy)} YoY</span>
                        )}
                    </div>
                </div>
            );
        };

        const MiniTrend = ({ data, color = "#6366f1", height = 40 }) => {
            if (!data || data.length < 2) return <div style={{ height }} />;
            const max = Math.max(...data, 1);
            const points = data.map((v, i) => `${(i / (data.length - 1)) * 100},${height - (v / max) * height}`).join(' ');
            return (
                <svg width="100%" height={height} className="overflow-visible">
                    <polyline points={points} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        };

        function App() {
            const [rawData, setRawData] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState('');
            const [narratives, setNarratives] = useState({});
            const [narrativesByMonth, setNarrativesByMonth] = useState({});
            const [performanceRowsByMonth, setPerformanceRowsByMonth] = useState({});
            const [performanceTabsByMonth, setPerformanceTabsByMonth] = useState({});
            const [narrativeMonth, setNarrativeMonth] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [headers, setHeaders] = useState([]);
            const [setupComplete, setSetupComplete] = useState(false);
            const [apiKey, setApiKey] = useState('');
            const [actionState, setActionState] = useState({
                lightdash: { status: 'idle', progress: 0, message: '' },
                updates: { status: 'idle', progress: 0, message: '' },
                report: { status: 'idle', progress: 0, message: '' }
            });
            const reportMonths = useMemo(() => [...new Set(rawData.map(d => d.date))].sort().reverse(), [rawData]);

            const renderPlatformPct = (val, metricType, currVal) => {
                if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
                const isPos = val > 0;
                let good = isPos; 
                
                if (metricType === 'spend') good = isPos; 
                if (metricType === 'cm') good = isPos; 
                if (metricType === 'cpa') good = !isPos; 
                if (metricType === 'ltv') good = isPos; 
                if (metricType === 'payback') {
                    const prev = currVal / (1 + val);
                    good = Math.abs(currVal - 15) < Math.abs(prev - 15);
                }
                
                const color = good ? 'text-green-600' : 'text-[#d32f2f]';
                return (
                    <div className={`flex flex-col items-end leading-tight ${color}`}>
                        <span className="text-[10px] font-black">{isPos ? '+' : ''}{(val * 100).toFixed(1)}%</span>
                    </div>
                );
            };

            const renderTablePct = (val, metricType, currVal) => {
                if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
                const isPos = val > 0;
                let good = isPos; 
                
                if (metricType === 'spend') good = isPos; 
                if (metricType === 'cm') good = isPos; 
                if (metricType === 'cpa') good = !isPos; 
                if (metricType === 'ltv') good = isPos; 
                if (metricType === 'payback') {
                    const prev = currVal / (1 + val);
                    good = Math.abs(currVal - 15) < Math.abs(prev - 15);
                }
                
                const color = good ? 'text-green-600' : 'text-[#d32f2f]';
                return (
                    <span className={`text-[10px] font-black ${color}`}>{isPos ? '+' : ''}{(val * 100).toFixed(1)}%</span>
                );
            };

            const processCSVText = (csvText) => {
                try {
                    let text = csvText.replace(/^\uFEFF/, '');
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    const delimiter = lines[0].includes(';') ? ';' : ',';
                    const rawRows = parseCSVRows(text, delimiter);
                    
                    const mappedHeaders = rawRows[0].map(h => {
                        const clean = (h || "").trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                        if (clean.includes('month') || clean.includes('date')) return 'date';
                        if (clean.includes('region') && !clean.includes('country')) return 'region';
                        if (clean.includes('platform') || clean.includes('vendor') || clean.includes('source')) return 'platform';
                        if (clean.includes('country') || clean.includes('market') || clean.includes('entity') || clean.includes('location') || clean.includes('alpha2') || clean.includes('iso')) return 'country';
                        if (clean.includes('mncs') || clean.includes('deposit') || clean.includes('acq') || clean.includes('conv')) return 'mncs';
                        if (clean.includes('spend') || clean.includes('cost') || clean.includes('invest')) return 'spend';
                        if (clean.includes('payback')) return 'payback';
                        if (clean.includes('ltv')) return 'ltv';
                        if (clean.includes('regs') || clean.includes('regist')) return 'regs';
                        if (clean === 'cm' || clean.includes('internalmeasurescm') || clean.includes('interanlmeasurescm') || clean.includes('contributionmargin') || clean.endsWith('cm') || clean.includes('masterreportcm')) return 'cm';
                        return clean;
                    });
                    setHeaders(mappedHeaders);
                    const finalData = rawRows.slice(1).map(row => {
                        const obj = {};
                        mappedHeaders.forEach((h, i) => {
                            let v = (row[i] || "").trim();
                            if (h === 'platform') {
                                const p = v.toLowerCase();
                                if (p.includes('google')) v = 'Google AC';
                                else if (p.includes('moloco')) v = 'Moloco';
                                else if (p.includes('trade') || p.includes('ttd')) v = 'TTD';
                                else if (p.includes('avow')) v = 'Avow';
                            }
                            obj[h] = v;
                        });
                        if (!obj.date) obj.date = "No Date";
                        if (obj.region) obj.region = obj.region.toUpperCase().replace(/\s/g, '');
                        return obj;
                    });
                    setRawData(finalData);
                    const dates = [...new Set(finalData.map(r => r.date))].sort().reverse();
                    setSelectedMonth(dates[0] || "No Date");
                    setNarratives({});
                    setNarrativesByMonth({});
                    setPerformanceRowsByMonth({});
                    setPerformanceTabsByMonth({});
                    setNarrativeMonth('');
                    return finalData;
                } catch (err) {
                    console.error(err);
                    throw err;
                }
            };

            const processFile = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        processCSVText(ev.target.result);
                        setSetupComplete(true);
                    } catch (err) {
                        console.error(err);
                    }
                };
                reader.readAsText(file);
            };

            const updateAction = (key, patch) => {
                setActionState(prev => ({
                    ...prev,
                    [key]: { ...prev[key], ...patch }
                }));
            };

            const runActionWithProgress = async (key, work) => {
                const startedAt = Date.now();
                const minimumVisibleMs = 1200;
                const finishAfterMinimum = () => new Promise(resolve => {
                    window.setTimeout(resolve, Math.max(0, minimumVisibleMs - (Date.now() - startedAt)));
                });

                updateAction(key, { status: 'loading', progress: 8, message: '' });
                const interval = window.setInterval(() => {
                    setActionState(prev => {
                        const current = prev[key];
                        if (current.status !== 'loading') return prev;
                        return {
                            ...prev,
                            [key]: {
                                ...current,
                                progress: Math.min(88, current.progress + 10)
                            }
                        };
                    });
                }, 220);

                try {
                    const message = await work();
                    await finishAfterMinimum();
                    window.clearInterval(interval);
                    updateAction(key, { status: 'done', progress: 100, message: message || '' });
                    return true;
                } catch (err) {
                    await finishAfterMinimum();
                    window.clearInterval(interval);
                    console.error(err);
                    updateAction(key, { status: 'error', progress: 0, message: err.message || 'Something went wrong. Please try again.' });
                    return false;
                }
            };

            const getReportYear = (dateValue) => {
                const match = String(dateValue || '').match(/\b(20\d{2})\b/);
                return match ? match[1] : new Date().getFullYear();
            };

            const getPerformanceUpdateTabName = (monthValue = selectedMonth) => {
                if (monthValue && monthValue !== 'No Date') {
                    const monthName = getMoName(monthValue);
                    return /\b20\d{2}\b/.test(monthName) ? monthName : `${monthName} ${getReportYear(monthValue)}`;
                }
                const previousMonth = new Date();
                previousMonth.setMonth(previousMonth.getMonth() - 1);
                return `${MONTHS[previousMonth.getMonth()]} ${previousMonth.getFullYear()}`;
            };

            const getPerformanceUpdateTabCandidates = (monthValue = selectedMonth) => {
                const primary = getPerformanceUpdateTabName(monthValue);
                const year = getReportYear(monthValue);
                const monthName = monthValue && monthValue !== 'No Date' ? getMoName(monthValue) : primary.split(' ')[0];
                const monthIndex = MONTHS.findIndex(month => month.toLowerCase() === String(monthName).toLowerCase()) + 1;
                const paddedMonth = monthIndex ? String(monthIndex).padStart(2, '0') : '';
                const shortYear = String(year).slice(-2);
                const shortMonth = String(monthName || '').slice(0, 3);
                return [...new Set([
                    primary,
                    monthName,
                    `${shortMonth} ${year}`,
                    `${shortMonth} ${shortYear}`,
                    `${monthName} ${shortYear}`,
                    paddedMonth ? `${year}-${paddedMonth}` : '',
                    paddedMonth ? `${paddedMonth}-${year}` : '',
                    paddedMonth ? `${monthName} ${paddedMonth}` : ''
                ].map(value => String(value || '').trim()).filter(Boolean))];
            };

            const loadPerformanceUpdateRows = async (monthValue = selectedMonth) => {
                const candidates = getPerformanceUpdateTabCandidates(monthValue);
                const errors = [];
                for (const tabName of candidates) {
                    try {
                        const result = await loadRowsFromGoogleOrCache(PERFORMANCE_UPDATES_SHEET_ID, tabName, null);
                        return { ...result, tabName };
                    } catch (err) {
                        errors.push(`${tabName}: ${err.message}`);
                    }
                }
                throw new Error(`Could not find a Performance Updates tab for ${getPerformanceUpdateTabName(monthValue)}. Tried: ${candidates.join(', ')}.`);
            };

            const normalizeBridgeTabs = (tabs) => {
                if (Array.isArray(tabs)) {
                    return tabs
                        .map(tab => ({
                            name: String(tab.name || tab.title || tab.sheetName || tab.tabName || '').trim(),
                            matchedMonth: String(tab.matchedMonth || tab.month || tab.monthValue || '').trim(),
                            rows: tab.rows || []
                        }))
                        .filter(tab => tab.name && Array.isArray(tab.rows));
                }
                if (tabs && typeof tabs === 'object') {
                    return Object.entries(tabs)
                        .map(([name, rows]) => ({ name: String(name || '').trim(), rows }))
                        .filter(tab => tab.name && Array.isArray(tab.rows));
                }
                return [];
            };

            const loadAllPerformanceUpdateTabs = async (months = []) => {
                const payload = await loadBridgePayload(PERFORMANCE_UPDATES_SHEET_ID, { allTabs: true, months });
                const tabs = normalizeBridgeTabs(payload.tabs || payload.sheets || payload.sheetTabs);
                if (!tabs.length) throw new Error('The Wise data bridge did not return Performance Updates tabs.');
                return { source: 'Wise data bridge', tabs };
            };

            const findPerformanceTabForMonth = (tabs, monthValue) => {
                const candidateKeys = getPerformanceUpdateTabCandidates(monthValue).map(normalizeKey);
                return tabs.find(tab => candidateKeys.includes(normalizeKey(tab.name))) || null;
            };

            const aggregate = (records) => {
                let s = 0, mRaw = 0, rRaw = 0, lSum = 0, pWSum = 0, pWeight = 0, cmSum = 0;
                records.forEach(rec => {
                    const sp = safeNum(rec.spend), mn = safeNum(rec.mncs), regs = safeNum(rec.regs), pb = safeNum(rec.payback), ltv = safeNum(rec.ltv), cm = safeNum(rec.cm);
                    s += sp; mRaw += mn; rRaw += regs; lSum += ltv * mn; cmSum += cm;
                    if (String(rec.payback || '').trim() !== '') {
                        pWSum += Math.min(pb, PAYBACK_OUTLIER_CAP) * mn;
                        pWeight += mn;
                    }
                });
                const m = Math.round(mRaw);
                const r = Math.round(rRaw);
                const cpa = m > 0 ? s / m : 0;
                const payback = pWeight !== 0 ? pWSum / pWeight : 0;
                const ltv = payback > 0 ? (cpa / payback) * 12 : (mRaw > 0 ? lSum / mRaw : 0);
                return { spend: s, mncs: m, regs: r, cpa, payback, ltv, cvr: r > 0 ? m / r : 0, cm: cmSum };
            };

            const buildReportDataForMonth = (monthValue) => {
                if (!rawData.length || !monthValue) return null;
                const dates = [...new Set(rawData.map(d => d.date))].sort();
                const curIdx = dates.indexOf(monthValue);
                if (curIdx === -1) return null;
                
                // Helper to get date string relative to current
                const getRelativeDate = (offset) => (curIdx - offset >= 0) ? dates[curIdx - offset] : null;
                const pmDate = getRelativeDate(1);
                const pqDate = getRelativeDate(3);
                const pyDate = getRelativeDate(12);

                const calcShift = (curr, prev) => prev > 0 ? (curr - prev) / prev : 0;

                const buildRegionalData = (regionName) => {
                    const isGlobal = regionName === 'GLOBAL';
                    
                    // Match the Paid Display source: Google App Campaigns, Moloco, The Trade Desk, and Avow.
                    const rMatchAll = rawData.filter(d => isGlobal || d.region === regionName);
                    const rMatchTrackedPlatforms = rMatchAll.filter(d => PLATFORMS_UI.includes(d.platform));
                    
                    const curMatchTrackedPlatforms = rMatchTrackedPlatforms.filter(d => d.date === monthValue);

                    const combineMetricScope = (date) => {
                        const allAgg = aggregate(rMatchAll.filter(d => d.date === date));
                        const trackedAgg = aggregate(rMatchTrackedPlatforms.filter(d => d.date === date));
                        return { ...trackedAgg, mncs: allAgg.mncs };
                    };

                    const stats = combineMetricScope(monthValue);
                    const getComp = (date) => combineMetricScope(date);
                    
                    const pmS = getComp(pmDate), pqS = getComp(pqDate), pyS = getComp(pyDate);

                    const platformStats = PLATFORMS_UI.map(p => {
                        const pMatch = rMatchTrackedPlatforms.filter(d => d.platform === p);
                        const curAgg = aggregate(pMatch.filter(d => d.date === monthValue));
                        const pmAgg = aggregate(pMatch.filter(d => d.date === pmDate));
                        const pqAgg = aggregate(pMatch.filter(d => d.date === pqDate));
                        const pyAgg = aggregate(pMatch.filter(d => d.date === pyDate));
                        const trendDates = dates.slice(Math.max(0, curIdx - 5), curIdx + 1);
                        const trend = trendDates.map(date => ({ month: date, ...aggregate(pMatch.filter(d => d.date === date)) }));
                        return { 
                            name: p, 
                            ...curAgg, 
                            trend,
                            shifts: {
                                mom: {
                                    spend: calcShift(curAgg.spend, pmAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pmAgg.mncs),
                                    payback: calcShift(curAgg.payback, pmAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pmAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pmAgg.cpa),
                                    cm: calcShift(curAgg.cm, pmAgg.cm)
                                },
                                qoq: {
                                    spend: calcShift(curAgg.spend, pqAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pqAgg.mncs),
                                    payback: calcShift(curAgg.payback, pqAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pqAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pqAgg.cpa),
                                    cm: calcShift(curAgg.cm, pqAgg.cm)
                                },
                                yoy: {
                                    spend: calcShift(curAgg.spend, pyAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pyAgg.mncs),
                                    payback: calcShift(curAgg.payback, pyAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pyAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pyAgg.cpa),
                                    cm: calcShift(curAgg.cm, pyAgg.cm)
                                }
                            }
                        };
                    });

                    // --- TABLE GROUPING LOGIC ---
                    const breakDownRecords = curMatchTrackedPlatforms;
                    let dimKey = isGlobal ? 'region' : 'country';
                    if (!isGlobal && breakDownRecords.every(d => !d.country || d.country === regionName)) {
                        const candidate = headers.find(h => !['date', 'region', 'platform', 'mncs', 'spend', 'regs', 'payback', 'ltv', 'cm', 'country'].includes(h));
                        if (candidate) dimKey = candidate;
                    }

                    const subLabels = [...new Set(breakDownRecords.map(d => d[dimKey]))].filter(v => v && v.toString().trim() !== "");
                    
                    let activeContribs = [];
                    let inactiveContribs = [];

                    subLabels.forEach(label => {
                        const marketRecords = breakDownRecords.filter(d => d[dimKey] === label);
                        const agg = aggregate(marketRecords);
                        if (agg.spend > 0) activeContribs.push({ label, ...agg });
                        else if (agg.mncs > 0) inactiveContribs.push({ label, ...agg });
                    });

                    let finalBreakDown = [...activeContribs].sort((a,b) => b.mncs - a.mncs);

                    if (inactiveContribs.length > 0) {
                        const restLabel = isGlobal ? "Rest of World" : `Rest of ${regionName}`;
                        const restAgg = inactiveContribs.reduce((acc, curr) => ({
                            spend: acc.spend + curr.spend,
                            regs: acc.regs + curr.regs,
                            mncs: acc.mncs + curr.mncs,
                            ltv: acc.ltv + curr.mncs * curr.ltv,
                            payback: acc.payback + curr.mncs * curr.payback,
                            cm: acc.cm + curr.cm
                        }), { spend: 0, regs: 0, mncs: 0, ltv: 0, payback: 0, cm: 0 });

                        finalBreakDown.push({
                            label: restLabel,
                            ...restAgg,
                            ltv: restAgg.mncs > 0 ? restAgg.ltv / restAgg.mncs : 0,
                            payback: restAgg.mncs > 0 ? restAgg.payback / restAgg.mncs : 0,
                            cpa: restAgg.mncs > 0 ? restAgg.spend / restAgg.mncs : 0,
                            isGroup: true
                        });
                    }

                    return { 
                        name: regionName, 
                        stats, 
                        shifts: {
                            mom: { spend: calcShift(stats.spend, pmS.spend), mncs: calcShift(stats.mncs, pmS.mncs), payback: calcShift(stats.payback, pmS.payback), ltv: calcShift(stats.ltv, pmS.ltv), cpa: calcShift(stats.cpa, pmS.cpa), cm: calcShift(stats.cm, pmS.cm) },
                            qoq: { spend: calcShift(stats.spend, pqS.spend), mncs: calcShift(stats.mncs, pqS.mncs), payback: calcShift(stats.payback, pqS.payback), ltv: calcShift(stats.ltv, pqS.ltv), cpa: calcShift(stats.cpa, pqS.cpa), cm: calcShift(stats.cm, pqS.cm) },
                            yoy: { spend: calcShift(stats.spend, pyS.spend), mncs: calcShift(stats.mncs, pyS.mncs), payback: calcShift(stats.payback, pyS.payback), ltv: calcShift(stats.ltv, pyS.ltv), cpa: calcShift(stats.cpa, pyS.cpa), cm: calcShift(stats.cm, pyS.cm) }
                        },
                        platformStats, 
                        breakDown: finalBreakDown.slice(0, 16), 
                        dimKey 
                    };
                };

                return { global: buildRegionalData('GLOBAL'), regions: REGIONS.map(r => buildRegionalData(r)).filter(r => r.stats.mncs > 0 || r.stats.spend > 0) };
            };

            const reportData = useMemo(() => buildReportDataForMonth(selectedMonth), [rawData, selectedMonth, headers]);

            const getMonthlyReportContext = (monthValue, dataOverride = null) => {
                const monthlyReportData = dataOverride || buildReportDataForMonth(monthValue);
                if (!monthlyReportData) return null;
                const monthName = getMoName(monthValue);
                const gacStats = monthlyReportData.global.platformStats.find(p => p.name === 'Google AC');
                const molocoStats = monthlyReportData.global.platformStats.find(p => p.name === 'Moloco');
                const ttdStats = monthlyReportData.global.platformStats.find(p => p.name === 'TTD');
                const defaultGlobal = `In ${monthName}, we drove ${monthlyReportData.global.stats.mncs.toLocaleString()} MNCs (${monthlyReportData.global.shifts.mom.mncs > 0 ? '+' : ''}${(monthlyReportData.global.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(monthlyReportData.global.stats.spend)} (${monthlyReportData.global.shifts.mom.spend > 0 ? '+' : ''}${(monthlyReportData.global.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${monthlyReportData.global.stats.payback.toFixed(1)}m (${monthlyReportData.global.shifts.mom.payback > 0 ? '+' : ''}${(monthlyReportData.global.shifts.mom.payback * 100).toFixed(1)}% MoM).`;
                const defaultGAC = gacStats ? `In ${monthName}, Google App Campaigns drove ${gacStats.mncs.toLocaleString()} MNCs (${gacStats.shifts.mom.mncs > 0 ? '+' : ''}${(gacStats.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(gacStats.spend)} (${gacStats.shifts.mom.spend > 0 ? '+' : ''}${(gacStats.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${gacStats.payback.toFixed(1)}m (${gacStats.shifts.mom.payback > 0 ? '+' : ''}${(gacStats.shifts.mom.payback * 100).toFixed(1)}% MoM).` : '';
                const defaultMoloco = molocoStats ? `In ${monthName}, Moloco drove ${molocoStats.mncs.toLocaleString()} MNCs (${molocoStats.shifts.mom.mncs > 0 ? '+' : ''}${(molocoStats.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(molocoStats.spend)} (${molocoStats.shifts.mom.spend > 0 ? '+' : ''}${(molocoStats.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${molocoStats.payback.toFixed(1)}m (${molocoStats.shifts.mom.payback > 0 ? '+' : ''}${(molocoStats.shifts.mom.payback * 100).toFixed(1)}% MoM).` : '';
                const defaultTTD = ttdStats ? `In ${monthName}, The Trade Desk drove ${ttdStats.mncs.toLocaleString()} MNCs (${ttdStats.shifts.mom.mncs > 0 ? '+' : ''}${(ttdStats.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(ttdStats.spend)} (${ttdStats.shifts.mom.spend > 0 ? '+' : ''}${(ttdStats.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${ttdStats.payback.toFixed(1)}m (${ttdStats.shifts.mom.payback > 0 ? '+' : ''}${(ttdStats.shifts.mom.payback * 100).toFixed(1)}% MoM).` : '';
                return {
                    monthValue,
                    reportData: monthlyReportData,
                    gacGlobalStats: gacStats,
                    molocoGlobalStats: molocoStats,
                    ttdGlobalStats: ttdStats,
                    defaultGlobalPerfText: defaultGlobal,
                    defaultGACPerfText: defaultGAC,
                    defaultMolocoPerfText: defaultMoloco,
                    defaultTTDPerfText: defaultTTD
                };
            };

            const currentReportContext = getMonthlyReportContext(selectedMonth, reportData);
            const gacGlobalStats = currentReportContext?.gacGlobalStats;
            const molocoGlobalStats = currentReportContext?.molocoGlobalStats;
            const ttdGlobalStats = currentReportContext?.ttdGlobalStats;

            const defaultGlobalPerfText = currentReportContext?.defaultGlobalPerfText || "";
            const defaultGACPerfText = currentReportContext?.defaultGACPerfText || "";
            const defaultMolocoPerfText = currentReportContext?.defaultMolocoPerfText || "";
            const defaultTTDPerfText = currentReportContext?.defaultTTDPerfText || "";

            const stripPlatformLabel = (value) => {
                const stripped = fixCommonText(value).replace(/^(Google AC|Google App Campaigns|GAC|Google|The Trade Desk|Trade Desk|TTD|Moloco)\s*[:>-]?\s*/i, '').trim();
                return stripped ? stripped.charAt(0).toUpperCase() + stripped.slice(1) : '';
            };

            const getRegionalPerformanceBase = (reg, platformUpdates = {}, reportContext = currentReportContext) => {
                const monthValue = reportContext?.monthValue || selectedMonth;
                const intro = `${getMoName(monthValue)} concluded in ${reg.name} with ${reg.stats.mncs.toLocaleString()} MNCs (${reg.shifts.mom.mncs > 0 ? '+' : ''}${(reg.shifts.mom.mncs * 100).toFixed(1)}% MoM) at a ${reg.stats.payback.toFixed(1)}-month payback.`;
                const platformSections = REGIONAL_NARRATIVE_SEQUENCE.map(meta => {
                    const p = reg.platformStats.find(platform => platform.name === meta.statName);
                    if (!p || p.mncs <= 0) return '';
                    const mainLine = `${meta.narrativeName} drove ${p.mncs.toLocaleString()} MNCs at a ${p.payback.toFixed(1)}-month payback with an LTV of £${p.ltv.toFixed(2)}.`;
                    const sheetNotes = (platformUpdates[meta.key] || []).map(stripPlatformLabel).filter(Boolean);
                    return [mainLine, ...sheetNotes].join('\n\n');
                }).filter(Boolean);
                const otherNotes = (platformUpdates.OTHER || []).map(fixCommonText).filter(Boolean);
                return [intro, ...platformSections, ...otherNotes].filter(Boolean).join('\n\n');
            };

            const getBasePerformanceForTarget = (target, reportContext = currentReportContext) => {
                if (target === 'GLOBAL') return reportContext?.defaultGlobalPerfText || '';
                if (target === 'GAC') return reportContext?.defaultGACPerfText || '';
                if (target === 'MOLOCO') return reportContext?.defaultMolocoPerfText || '';
                if (target === 'TTD') return reportContext?.defaultTTDPerfText || '';
                const reg = reportContext?.reportData?.regions?.find(r => r.name === target);
                return reg ? getRegionalPerformanceBase(reg, {}, reportContext) : '';
            };

            const normalizeKey = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');

            const normalizeUpdateTarget = (value) => {
                const key = normalizeKey(value);
                if (!key) return null;
                const aliases = {
                    latam: 'LATAM',
                    latinamerica: 'LATAM',
                    northam: 'NORTHAM',
                    northamerica: 'NORTHAM',
                    nam: 'NORTHAM',
                    na: 'NORTHAM',
                    europe: 'EUROPE',
                    eu: 'EUROPE',
                    asia: 'ASIA',
                    pacific: 'PACIFIC',
                    anz: 'PACIFIC',
                    australia: 'PACIFIC',
                    australianewzealand: 'PACIFIC',
                    gbr: 'GBR',
                    uk: 'GBR',
                    unitedkingdom: 'GBR',
                    mea: 'MEA',
                    middleeastafrica: 'MEA',
                    global: 'GLOBAL',
                    google: 'GAC',
                    googleac: 'GAC',
                    appcampaigns: 'GAC',
                    gac: 'GAC',
                    moloco: 'MOLOCO',
                    tradedesk: 'TTD',
                    thetradedesk: 'TTD',
                    ttd: 'TTD',
                    team: 'team_updates',
                    teamupdate: 'team_updates',
                    teamupdates: 'team_updates',
                    teamnews: 'team_updates',
                    peopleupdates: 'team_updates',
                    upcoming: 'upcoming_plans',
                    upcomingplan: 'upcoming_plans',
                    upcomingplans: 'upcoming_plans',
                    nextmonthplans: 'upcoming_plans',
                    nextsteps: 'upcoming_plans',
                    paiddisplayupdates: 'upcoming_plans'
                };
                if (REGIONS.includes(String(value).trim().toUpperCase())) return String(value).trim().toUpperCase();
                return aliases[key] || null;
            };

            const cleanUpdateText = (value) => String(value || '').trim().replace(/\r\n/g, '\n');

            const fixCommonText = (value) => {
                let text = cleanUpdateText(value);
                const replacements = [
                    [/\bIEarly\b/g, 'Early'],
                    [/\bregistrtions\b/gi, 'registrations'],
                    [/\bacttiviy\b/gi, 'activity'],
                    [/\bactiviy\b/gi, 'activity'],
                    [/\bslighly\b/gi, 'slightly'],
                    [/\bscalated\b/gi, 'scaled'],
                    [/\bscalate\b/gi, 'scale'],
                    [/\binAUS\b/g, 'in AUS'],
                    [/\ba in-platform\b/gi, 'an in-platform'],
                    [/\ba local\b/gi, 'a local'],
                    [/\bFull-funnel\b/g, 'full-funnel']
                ];
                replacements.forEach(([pattern, replacement]) => {
                    text = text.replace(pattern, replacement);
                });
                return text
                    .split('\n')
                    .map(line => line.trim().replace(/\s+/g, ' '))
                    .join('\n')
                    .replace(/\n{3,}/g, '\n\n')
                    .trim();
            };

            const polishPlanLine = (value) => {
                let line = fixCommonText(value).replace(/\s+/g, ' ').trim();
                const replacements = [
                    [/^Making\b/i, 'Make'],
                    [/^Continuing\b/i, 'Continue'],
                    [/^Adding\b/i, 'Add'],
                    [/^Starting\b/i, 'Start'],
                    [/^Updating\b/i, 'Update'],
                    [/^Keeping\b/i, 'Keep'],
                    [/^Testing\b/i, 'Test']
                ];
                replacements.forEach(([pattern, replacement]) => {
                    line = line.replace(pattern, replacement);
                });
                if (!line) return '';
                line = line.charAt(0).toUpperCase() + line.slice(1);
                return /[.!?]$/.test(line) ? line : `${line}.`;
            };

            const normalizePlanText = (value) => {
                const splitActionChunks = (line) => {
                    const chunks = line.split(/(?=\b(?:Continue|Make|Start|Reactivate|Keep|Launch|Update|Evaluate|Refine|Implement|Finalize|Maintain|Review|Test|Reevaluate|Hold|Scale)\b)/g)
                        .map(chunk => chunk.trim())
                        .filter(Boolean);
                    return chunks.length > 1 ? chunks : [line];
                };
                const lines = fixCommonText(value)
                    .replace(/\s+\d+[\.)]\s+/g, '\n')
                    .split('\n')
                    .flatMap(splitActionChunks)
                    .map(line => {
                        let text = line.trim().replace(/^(\d+[\.)]\s*)[-*•]\s*/, '');
                        text = text.replace(/^\d+[\.)]\s*/, '').replace(/^[-*•]\s*/, '').trim();
                        const polished = polishPlanLine(text);
                        return polished || '';
                    })
                    .filter(Boolean);
                return lines.join('\n\n');
            };

            const getPlanTextStyle = (value, variant = 'standard') => {
                const text = String(value || '');
                const nonEmptyLines = text.split('\n').map(line => line.trim()).filter(Boolean);
                const approxCharsPerLine = variant === 'large' ? 38 : variant === 'regional' ? 64 : 70;
                const visualLines = nonEmptyLines.reduce((sum, line) => sum + Math.max(1, Math.ceil(line.length / approxCharsPerLine)), 0);
                const paragraphGaps = Math.max(0, text.split(/\n\s*\n/).filter(chunk => chunk.trim()).length - 1);
                const fitScore = visualLines + paragraphGaps;
                let fontSize = variant === 'large' ? 15 : variant === 'regional' ? 14 : 13;
                let lineHeight = variant === 'large' ? 1.5 : variant === 'regional' ? 1.55 : 1.6;

                if (fitScore > 22 || text.length > 1200) {
                    fontSize = 9;
                    lineHeight = 1.25;
                } else if (fitScore > 18 || text.length > 950) {
                    fontSize = 10;
                    lineHeight = 1.3;
                } else if (fitScore > 14 || text.length > 720) {
                    fontSize = 11;
                    lineHeight = 1.35;
                } else if (fitScore > 10 || text.length > 520) {
                    fontSize = 12;
                    lineHeight = 1.45;
                }

                return {
                    '--plan-font-size': `${fontSize}px`,
                    '--plan-line-height': lineHeight
                };
            };

            const cleanupNarratives = (source = {}) => Object.entries(source).reduce((acc, [key, value]) => {
                if (key.endsWith('_plan') || key === 'upcoming_plans') acc[key] = normalizePlanText(value);
                else acc[key] = fixCommonText(value);
                return acc;
            }, {});

            const labelUpdateText = (header, value) => {
                const text = cleanUpdateText(value);
                if (!text) return '';
                const meta = getPlatformMeta(header);
                if (meta?.key === 'GAC' && !/^(google|gac)\b/i.test(text)) return `Google AC: ${text}`;
                if (meta?.key === 'TTD' && !/^(ttd|the trade desk|trade desk)\b/i.test(text)) return `The Trade Desk: ${text}`;
                if (meta?.key === 'MOLOCO' && !/^moloco\b/i.test(text)) return `Moloco: ${text}`;
                return text;
            };

            const buildNarrativesFromUpdateRows = (rows, monthValue = selectedMonth, reportContext = getMonthlyReportContext(monthValue)) => {
                const monthlyReportData = reportContext?.reportData;
                if (!monthlyReportData || rows.length < 2) return {};
                const headers = rows[0].map(h => String(h || ''));
                const headerKeys = headers.map(normalizeKey);
                const targetIdx = headerKeys.findIndex(h => ['region', 'marketingregion', 'marketregion', 'geo', 'area', 'market', 'slide', 'section', 'platform', 'channel'].some(term => h.includes(term)));
                const teamIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && (h.includes('teamupdate') || h.includes('teamnews') || h === 'team'))
                    .map(({ idx }) => idx);
                const deckPlanIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && (h === 'upcomingplans' || h === 'upcomingplan' || h === 'nextsteps' || h === 'deckplans'))
                    .map(({ idx }) => idx);
                const planIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && !teamIdxs.includes(idx) && !deckPlanIdxs.includes(idx) && ['plan', 'nextmonth', 'upcoming', 'initiative', 'action'].some(term => h.includes(term)))
                    .map(({ idx }) => idx);
                const perfIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && !planIdxs.includes(idx) && !teamIdxs.includes(idx) && !deckPlanIdxs.includes(idx) && ['performance', 'perf', 'update', 'summary', 'commentary', 'highlight', 'result', 'google', 'gac', 'moloco', 'ttd', 'tradedesk'].some(term => h.includes(term)))
                    .map(({ idx }) => idx);
                const updates = {};
                const slideUpdates = { team_updates: [], upcoming_plans: [] };

                const collectSpecialRow = (target, row) => {
                    const rowTexts = row
                        .map((cell, idx) => idx === targetIdx ? '' : cleanUpdateText(cell))
                        .filter(text => text.length > 1 && !normalizeUpdateTarget(text));
                    rowTexts.forEach(text => slideUpdates[target].push(text));
                };

                rows.slice(1).forEach(row => {
                    const target = normalizeUpdateTarget(row[targetIdx]) || row.map(normalizeUpdateTarget).find(Boolean);
                    teamIdxs.map(idx => cleanUpdateText(row[idx])).filter(Boolean).forEach(text => slideUpdates.team_updates.push(text));
                    deckPlanIdxs.map(idx => cleanUpdateText(row[idx])).filter(Boolean).forEach(text => slideUpdates.upcoming_plans.push(text));

                    if (target === 'team_updates' || target === 'upcoming_plans') {
                        collectSpecialRow(target, row);
                        return;
                    }

                    if (!target) return;
                    if (!updates[target]) updates[target] = { perf: [], plan: [], platformPerf: { GAC: [], TTD: [], MOLOCO: [], AVOW: [], OTHER: [] } };

                    const addPerformanceUpdate = (header, value) => {
                        const text = cleanUpdateText(value);
                        if (!text || text.length <= 8 || normalizeUpdateTarget(text)) return '';
                        const labeled = labelUpdateText(header, text);
                        const meta = getPlatformMeta(header) || getPlatformMeta(text);
                        const platformKey = meta?.key || 'OTHER';
                        if (!updates[target].platformPerf[platformKey]) updates[target].platformPerf[platformKey] = [];
                        updates[target].platformPerf[platformKey].push(labeled);
                        return labeled;
                    };

                    const performanceCells = perfIdxs.length
                        ? perfIdxs.map(idx => addPerformanceUpdate(headers[idx], row[idx]))
                        : row.map((cell, idx) => {
                            if (idx === targetIdx || planIdxs.includes(idx)) return '';
                            return addPerformanceUpdate(headers[idx] || '', cell);
                        });

                    const planCells = planIdxs.map(idx => cleanUpdateText(row[idx]));
                    performanceCells.filter(Boolean).forEach(text => updates[target].perf.push(text));
                    planCells.filter(Boolean).forEach(text => updates[target].plan.push(text));
                });

                const narrativeUpdates = Object.entries(updates).reduce((acc, [target, sections]) => {
                    const perf = [...new Set(sections.perf.map(cleanUpdateText).filter(Boolean))];
                    const plan = [...new Set(sections.plan.map(normalizePlanText).filter(Boolean))];
                    const base = getBasePerformanceForTarget(target, reportContext);
                    if (perf.length) {
                        if (REGIONS.includes(target)) {
                            const reg = monthlyReportData?.regions?.find(r => r.name === target);
                            acc[`${target}_perf`] = reg ? getRegionalPerformanceBase(reg, sections.platformPerf, reportContext) : fixCommonText(perf.join('\n\n'));
                        } else {
                            acc[`${target}_perf`] = base ? fixCommonText(`${base}\n\n${perf.join('\n\n')}`) : fixCommonText(perf.join('\n\n'));
                        }
                    }
                    if (plan.length) acc[`${target}_plan`] = plan.join('\n\n');
                    return acc;
                }, {});

                const teamUpdates = [...new Set(slideUpdates.team_updates.map(cleanUpdateText).filter(Boolean))];
                const upcomingPlans = [...new Set(slideUpdates.upcoming_plans.map(cleanUpdateText).filter(Boolean))];
                if (teamUpdates.length) narrativeUpdates.team_updates = teamUpdates.join('\n\n');
                if (upcomingPlans.length) narrativeUpdates.upcoming_plans = upcomingPlans.join('\n\n');

                return narrativeUpdates;
            };

            useEffect(() => {
                if (!selectedMonth || !reportData) return;

                const savedNarratives = narrativesByMonth[selectedMonth];
                if (savedNarratives) {
                    setNarratives(savedNarratives);
                    setNarrativeMonth(selectedMonth);
                    return;
                }

                const savedRows = performanceRowsByMonth[selectedMonth];
                if (savedRows) {
                    const updateNarratives = cleanupNarratives(buildNarrativesFromUpdateRows(savedRows, selectedMonth));
                    setNarratives(updateNarratives);
                    setNarrativesByMonth(prev => ({ ...prev, [selectedMonth]: updateNarratives }));
                    setNarrativeMonth(selectedMonth);
                    return;
                }

                setNarratives({});
                setNarrativeMonth('');
            }, [selectedMonth, reportData, performanceRowsByMonth, narrativesByMonth]);

            const handleUploadLightdashData = () => runActionWithProgress('lightdash', async () => {
                const { rows, source } = await loadRowsFromGoogleOrCache(LIGHTDASH_SHEET_ID, null, null);
                if (rows.length < 2) throw new Error('No Lightdash rows were found in the Google Sheet.');
                const finalData = processCSVText(sheetRowsToCSV(rows));
                return `Uploaded ${finalData.length.toLocaleString()} Lightdash rows from ${source}.`;
            });

            const handleUploadPerformanceUpdates = () => runActionWithProgress('updates', async () => {
                if (!rawData.length || !reportData) throw new Error('Upload Lightdash data first so the tool can choose the correct month tab.');
                const months = reportMonths.length ? reportMonths : [selectedMonth];
                const loadedRowsByMonth = {};
                const loadedTabsByMonth = {};
                let sourceName = 'Wise data bridge';
                let loadedViaBridgeIndex = false;

                try {
                    const { source, tabs } = await loadAllPerformanceUpdateTabs(months);
                    sourceName = source || sourceName;
                    loadedViaBridgeIndex = true;
                    tabs.forEach(tab => {
                        if (tab.matchedMonth && months.includes(tab.matchedMonth)) {
                            loadedRowsByMonth[tab.matchedMonth] = tab.rows;
                            loadedTabsByMonth[tab.matchedMonth] = tab.name;
                        }
                    });
                    months.forEach(month => {
                        if (loadedRowsByMonth[month]) return;
                        const match = findPerformanceTabForMonth(tabs, month);
                        if (match) {
                            loadedRowsByMonth[month] = match.rows;
                            loadedTabsByMonth[month] = match.name;
                        }
                    });
                } catch (err) {
                    console.warn(err);
                }

                if (!loadedViaBridgeIndex) {
                    for (const month of months) {
                        if (loadedRowsByMonth[month]) continue;
                        try {
                            const { rows, source, tabName } = await loadPerformanceUpdateRows(month);
                            loadedRowsByMonth[month] = rows;
                            loadedTabsByMonth[month] = tabName;
                            sourceName = source || sourceName;
                        } catch (err) {
                            console.warn(err);
                        }
                    }
                }

                if (!loadedRowsByMonth[selectedMonth]) {
                    throw new Error(`No Performance Updates tab was found for ${getPerformanceUpdateTabName(selectedMonth)}. Check the tab name in the Performance Updates Sheet.`);
                }

                const builtNarrativesByMonth = {};
                Object.entries(loadedRowsByMonth).forEach(([month, rows]) => {
                    const monthContext = getMonthlyReportContext(month);
                    if (!monthContext) return;
                    const updateNarratives = cleanupNarratives(buildNarrativesFromUpdateRows(rows, month, monthContext));
                    if (Object.keys(updateNarratives).length) {
                        builtNarrativesByMonth[month] = updateNarratives;
                    }
                });

                const selectedTabName = loadedTabsByMonth[selectedMonth];
                if (!builtNarrativesByMonth[selectedMonth]) {
                    throw new Error(`No usable updates were found in the ${selectedTabName} tab. Check the tab name and column labels.`);
                }

                setPerformanceRowsByMonth(prev => ({ ...prev, ...loadedRowsByMonth }));
                setPerformanceTabsByMonth(prev => ({ ...prev, ...loadedTabsByMonth }));
                setNarrativesByMonth(prev => ({ ...prev, ...builtNarrativesByMonth }));
                setNarratives(builtNarrativesByMonth[selectedMonth]);
                setNarrativeMonth(selectedMonth);
                const loadedCount = Object.keys(loadedRowsByMonth).length;
                const preparedCount = Object.keys(builtNarrativesByMonth).length;
                const skippedCount = Math.max(0, months.length - loadedCount);
                return `Uploaded all Performance Updates from ${sourceName}. Prepared ${preparedCount} month report${preparedCount === 1 ? '' : 's'}${skippedCount ? `; skipped ${skippedCount} month${skippedCount === 1 ? '' : 's'} without tabs` : ''}.`;
            });

            const splitNotes = (text) => cleanUpdateText(text)
                .split(/\n+|[.!?]\s+/)
                .map(note => note.replace(/^-+\s*/, '').trim())
                .filter(note => note.length > 24);

            const containsAny = (text, terms) => {
                const lower = String(text || '').toLowerCase();
                return terms.some(term => lower.includes(term.toLowerCase()));
            };

            const regionTextBundle = (regionName, sourceNarratives = narratives) => [
                sourceNarratives[`${regionName}_perf`] || '',
                sourceNarratives[`${regionName}_plan`] || ''
            ].filter(Boolean).join(' ');

            const buildStrategicPlanLines = (targets = [], sourceNarratives = narratives) => {
                const allText = REGIONS.map(region => regionTextBundle(region, sourceNarratives)).join(' ');
                const regionText = Object.fromEntries(REGIONS.map(region => [region, regionTextBundle(region, sourceNarratives)]));
                const targetKeys = targets.map(target => String(target).toLowerCase());
                const isGlobal = !targetKeys.length;
                const isGAC = targetKeys.some(key => ['google', 'gac', 'google ac', 'google app campaigns'].includes(key));
                const isMoloco = targetKeys.some(key => key.includes('moloco'));
                const isTTD = targetKeys.some(key => key.includes('ttd') || key.includes('trade desk') || key.includes('programmatic') || key.includes('video'));
                const lines = [];

                if (isGlobal) {
                    if (containsAny(regionText.ASIA, ['Malaysia', 'Philippines', 'Singapore', 'Japan', 'scaling', 'video consideration'])) {
                        lines.push('Continue to scale and optimize Paid Display activity in ASIA, leveraging successful targeting strategies in Malaysia, the Philippines, and Singapore.');
                    }
                    if (containsAny(regionText.NORTHAM, ['USA', 'Canada', 'tCPA', 'budget', 'full-funnel', 'conversion lift'])) {
                        lines.push('Refine budget allocation and creative strategy in NORTHAM, balancing USA and Canada scaling with strict CPA and payback controls.');
                    }
                    if (containsAny(allText, ['video consideration', 'CTV', 'World Cup', 'Japan', 'Singapore', 'Australia'])) {
                        lines.push('Implement video consideration and CTV campaigns in high-performing markets such as Japan, Singapore, and Australia to support the wider Paid Display strategy.');
                    }
                    if (containsAny(allText, ['conversion lift', 'full-funnel', 'in-app', 'retargeting', 'TTD'])) {
                        lines.push('Reevaluate and enhance TTD strategy based on conversion lift findings, shifting toward full-funnel in-app and video targeting with more precise audience controls.');
                    }
                    if (containsAny(allText, ['incrementality', 'NZL', 'New Zealand', 'Moloco iOS', 'baseline value'])) {
                        lines.push('Finalize incrementality test analysis across PACIFIC, NZL and other active markets to guide scaling decisions for Moloco and related display platforms.');
                    }
                    if (containsAny(allText, ['creative', 'Spotify']) && lines.length < 5) {
                        lines.push('Refresh creative rotation and reactivate Spotify where performance supports incremental reach and improved payback.');
                    }
                }

                if (isGAC) {
                    if (containsAny(regionText.NORTHAM, ['USA', 'Canada', 'tCPA', 'budget'])) {
                        lines.push('Continue strategic GAC scaling in NORTHAM across the USA and Canada, while protecting CPA and payback efficiency.');
                    }
                    if (containsAny(regionText.ASIA, ['Malaysia', 'Philippines', 'Singapore', 'efficient CPA'])) {
                        lines.push('Keep scaling GAC in ASIA where Malaysia, the Philippines and Singapore are driving efficient MNC growth.');
                    }
                    if (containsAny(regionText.EUROPE + regionText.GBR, ['budget', 'creative', 'payback', 'registrations'])) {
                        lines.push('Use budget and creative adjustments in EUROPE and GBR to scale the most efficient GAC campaigns without drifting above payback targets.');
                    }
                }

                if (isMoloco) {
                    if (containsAny(allText, ['incrementality', 'NZL', 'New Zealand', 'iOS'])) {
                        lines.push('Continue Moloco incrementality testing in NZL and other active test markets to validate the channel before further scaling.');
                    }
                    if (containsAny(regionText.PACIFIC, ['Australia', 'hold spend', 'baseline value', 'performance stability'])) {
                        lines.push('Hold Moloco spend steady in PACIFIC until incrementality results confirm baseline value and scaling headroom.');
                    }
                    if (containsAny(regionText.LATAM + regionText.GBR + regionText.EUROPE, ['LTV', 'record month', 'room to scale', 'payback'])) {
                        lines.push('Evaluate Moloco scaling opportunities in LATAM, GBR and EUROPE where LTV and payback trends support renewed investment.');
                    }
                }

                if (isTTD) {
                    if (containsAny(regionText.NORTHAM, ['conversion lift', 'full-funnel', 'in-app', 'video targeting'])) {
                        lines.push('Rebuild NORTHAM TTD strategy around full-funnel in-app and video targeting, using conversion lift findings to retest incremental value.');
                    }
                    if (containsAny(regionText.GBR + allText, ['Video strategies', 'creative engine', 'CTV', 'video consideration'])) {
                        lines.push('Launch and scale TTD video strategies using new creative engine assets in GBR and other high-performing markets.');
                    }
                    if (containsAny(regionText.ASIA + regionText.EUROPE, ['Japan', 'Singapore', 'Malaysia', 'pre-trip', 'budget and bid adjustments'])) {
                        lines.push('Continue refining TTD budget, bid and pre-trip audience strategies in ASIA and EUROPE to improve payback and LTV quality.');
                    }
                }

                return [...new Set(lines)].map(polishPlanLine).filter(Boolean);
            };

            const collectPlanLines = (targets = [], sourceNarratives = narratives, reportContext = currentReportContext) => {
                const monthlyReportData = reportContext?.reportData;
                const lines = monthlyReportData?.regions?.flatMap(r => normalizePlanText(sourceNarratives[`${r.name}_plan`] || '').split(/\n+/).map(line => line.trim()).filter(Boolean)) || [];
                const unique = [...new Set(lines)];
                const formatPlanLines = (items, limit) => items
                    .slice(0, limit)
                    .map(line => line.replace(/^\d+[\.)]\s*/, '').trim())
                    .map(polishPlanLine)
                    .filter(Boolean)
                    .join('\n\n');
                const strategic = buildStrategicPlanLines(targets, sourceNarratives);
                if (strategic.length) return strategic.slice(0, targets.length ? 3 : 5).join('\n\n');
                if (!targets.length) return formatPlanLines(unique, 5);
                const targetKeys = targets.map(t => t.toLowerCase());
                const filtered = unique.filter(line => targetKeys.some(key => line.toLowerCase().includes(key)));
                return formatPlanLines(filtered.length ? filtered : unique, 3);
            };

            const describeRegionalVariance = (reportContext = currentReportContext) => {
                const regions = [...(reportContext?.reportData?.regions || [])].filter(r => isFinite(r.shifts?.mom?.mncs));
                if (!regions.length) return '';
                const leaders = [...regions].sort((a, b) => b.shifts.mom.mncs - a.shifts.mom.mncs).slice(0, 2);
                const laggards = [...regions].sort((a, b) => a.shifts.mom.mncs - b.shifts.mom.mncs).slice(0, 2);
                const leaderText = leaders.map(r => `${r.name} (${r.shifts.mom.mncs > 0 ? '+' : ''}${(r.shifts.mom.mncs * 100).toFixed(1)}% MoM)`).join(' and ');
                const laggardText = laggards.map(r => `${r.name} (${r.shifts.mom.mncs > 0 ? '+' : ''}${(r.shifts.mom.mncs * 100).toFixed(1)}% MoM)`).join(' and ');
