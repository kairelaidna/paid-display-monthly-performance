            const aggregate = (records) => {
                let s = 0, m = 0, r = 0, lSum = 0, pWSum = 0, cmSum = 0;
                records.forEach(rec => {
                    const sp = safeNum(rec.spend), mn = Math.round(safeNum(rec.mncs)), regs = Math.round(safeNum(rec.regs)), pb = safeNum(rec.payback), ltv = safeNum(rec.ltv), cm = safeNum(rec.cm);
                    s += sp; m += mn; r += regs; lSum += ltv * mn; pWSum += pb * mn; cmSum += cm;
                });
                return { spend: s, mncs: m, regs: r, cpa: m > 0 ? s / m : 0, payback: m > 0 ? pWSum / m : 0, ltv: m > 0 ? lSum / m : 0, cvr: r > 0 ? m / r : 0, cm: cmSum };
            };

            const buildReportDataForMonth = (monthValue, dataRows = rawData) => {
                if (!dataRows.length || !monthValue) return null;
                const dates = [...new Set(dataRows.map(d => d.date))].sort();
                const curIdx = dates.indexOf(monthValue);
                if (curIdx === -1) return null;
                
                // Helper to get date string relative to current
                const getRelativeDate = (offset) => (curIdx - offset >= 0) ? dates[curIdx - offset] : null;
                const pmDate = getRelativeDate(1);
                const pqDate = getRelativeDate(3);
                const pyDate = getRelativeDate(12);

                const calcShift = (curr, prev) => prev > 0 ? (curr - prev) / prev : 0;

                const buildRegionalData = (regionName) => {
                    const isGlobal = regionName === 'GLOBAL';
                    
                    // Overall headline cards include Avow; all other report detail stays on the core three platforms.
                    const rMatchAll = dataRows.filter(d => isGlobal || d.region === regionName);
                    const rMatchOverallPlatforms = rMatchAll.filter(d => OVERALL_PLATFORMS_UI.includes(d.platform));
                    const rMatchCorePlatforms = rMatchAll.filter(d => CORE_PLATFORMS_UI.includes(d.platform));
                    
                    const curMatchCorePlatforms = rMatchCorePlatforms.filter(d => d.date === monthValue);

                    const combineMetricScope = (date) => aggregate(rMatchCorePlatforms.filter(d => d.date === date));
                    const combineHeadlineScope = (date) => aggregate(rMatchOverallPlatforms.filter(d => d.date === date));

                    const stats = combineMetricScope(monthValue);
                    const getComp = (date) => combineMetricScope(date);
                    
                    const pmS = getComp(pmDate), pqS = getComp(pqDate), pyS = getComp(pyDate);
                    const headlineStats = isGlobal ? combineHeadlineScope(monthValue) : null;
                    const headlinePmS = isGlobal ? combineHeadlineScope(pmDate) : null;
                    const headlinePqS = isGlobal ? combineHeadlineScope(pqDate) : null;
                    const headlinePyS = isGlobal ? combineHeadlineScope(pyDate) : null;

                    const platformStats = CORE_PLATFORMS_UI.map(p => {
                        const pMatch = rMatchCorePlatforms.filter(d => d.platform === p);
                        const curAgg = aggregate(pMatch.filter(d => d.date === monthValue));
                        const pmAgg = aggregate(pMatch.filter(d => d.date === pmDate));
                        const pqAgg = aggregate(pMatch.filter(d => d.date === pqDate));
                        const pyAgg = aggregate(pMatch.filter(d => d.date === pyDate));
                        const trendDates = dates.slice(Math.max(0, curIdx - 5), curIdx + 1);
                        const trend = trendDates.map(date => ({ month: date, ...aggregate(pMatch.filter(d => d.date === date)) }));
                        return { 
                            name: p, 
                            ...curAgg, 
                            trend,
                            shifts: {
                                mom: {
                                    spend: calcShift(curAgg.spend, pmAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pmAgg.mncs),
                                    payback: calcShift(curAgg.payback, pmAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pmAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pmAgg.cpa),
                                    cm: calcShift(curAgg.cm, pmAgg.cm)
                                },
                                qoq: {
                                    spend: calcShift(curAgg.spend, pqAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pqAgg.mncs),
                                    payback: calcShift(curAgg.payback, pqAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pqAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pqAgg.cpa),
                                    cm: calcShift(curAgg.cm, pqAgg.cm)
                                },
                                yoy: {
                                    spend: calcShift(curAgg.spend, pyAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pyAgg.mncs),
                                    payback: calcShift(curAgg.payback, pyAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pyAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pyAgg.cpa),
                                    cm: calcShift(curAgg.cm, pyAgg.cm)
                                }
                            }
                        };
                    });

                    // --- TABLE GROUPING LOGIC ---
                    const breakDownRecords = curMatchCorePlatforms;
                    let dimKey = isGlobal ? 'region' : 'country';
                    if (!isGlobal && breakDownRecords.every(d => !d.country || d.country === regionName)) {
                        const candidate = headers.find(h => !['date', 'region', 'platform', 'mncs', 'spend', 'regs', 'payback', 'ltv', 'cm', 'country'].includes(h));
                        if (candidate) dimKey = candidate;
                    }

                    const subLabels = [...new Set(breakDownRecords.map(d => d[dimKey]))].filter(v => v && v.toString().trim() !== "");
                    
                    let activeContribs = [];
                    let inactiveContribs = [];

                    subLabels.forEach(label => {
                        const marketRecords = breakDownRecords.filter(d => d[dimKey] === label);
                        const agg = aggregate(marketRecords);
                        if (agg.spend > 0) activeContribs.push({ label, ...agg });
                        else if (agg.mncs > 0) inactiveContribs.push({ label, ...agg });
                    });

                    let finalBreakDown = [...activeContribs].sort((a,b) => b.mncs - a.mncs);

                    if (inactiveContribs.length > 0) {
                        const restLabel = isGlobal ? "Rest of World" : `Rest of ${regionName}`;
                        const restAgg = inactiveContribs.reduce((acc, curr) => ({
                            spend: acc.spend + curr.spend,
                            regs: acc.regs + curr.regs,
                            mncs: acc.mncs + curr.mncs,
                            ltv: acc.ltv + curr.mncs * curr.ltv,
                            payback: acc.payback + curr.mncs * curr.payback,
                            cm: acc.cm + curr.cm
                        }), { spend: 0, regs: 0, mncs: 0, ltv: 0, payback: 0, cm: 0 });

                        finalBreakDown.push({
                            label: restLabel,
                            ...restAgg,
                            ltv: restAgg.mncs > 0 ? restAgg.ltv / restAgg.mncs : 0,
                            payback: restAgg.mncs > 0 ? restAgg.payback / restAgg.mncs : 0,
                            cpa: restAgg.mncs > 0 ? restAgg.spend / restAgg.mncs : 0,
                            isGroup: true
                        });
                    }

                    return { 
                        name: regionName, 
                        stats, 
                        shifts: {
                            mom: { spend: calcShift(stats.spend, pmS.spend), mncs: calcShift(stats.mncs, pmS.mncs), payback: calcShift(stats.payback, pmS.payback), ltv: calcShift(stats.ltv, pmS.ltv), cpa: calcShift(stats.cpa, pmS.cpa), cm: calcShift(stats.cm, pmS.cm) },
                            qoq: { spend: calcShift(stats.spend, pqS.spend), mncs: calcShift(stats.mncs, pqS.mncs), payback: calcShift(stats.payback, pqS.payback), ltv: calcShift(stats.ltv, pqS.ltv), cpa: calcShift(stats.cpa, pqS.cpa), cm: calcShift(stats.cm, pqS.cm) },
                            yoy: { spend: calcShift(stats.spend, pyS.spend), mncs: calcShift(stats.mncs, pyS.mncs), payback: calcShift(stats.payback, pyS.payback), ltv: calcShift(stats.ltv, pyS.ltv), cpa: calcShift(stats.cpa, pyS.cpa), cm: calcShift(stats.cm, pyS.cm) }
                        },
                        headline: isGlobal ? {
                            stats: headlineStats,
                            shifts: {
                                mom: { spend: calcShift(headlineStats.spend, headlinePmS.spend), mncs: calcShift(headlineStats.mncs, headlinePmS.mncs), payback: calcShift(headlineStats.payback, headlinePmS.payback), ltv: calcShift(headlineStats.ltv, headlinePmS.ltv), cpa: calcShift(headlineStats.cpa, headlinePmS.cpa), cm: calcShift(headlineStats.cm, headlinePmS.cm) },
                                qoq: { spend: calcShift(headlineStats.spend, headlinePqS.spend), mncs: calcShift(headlineStats.mncs, headlinePqS.mncs), payback: calcShift(headlineStats.payback, headlinePqS.payback), ltv: calcShift(headlineStats.ltv, headlinePqS.ltv), cpa: calcShift(headlineStats.cpa, headlinePqS.cpa), cm: calcShift(headlineStats.cm, headlinePqS.cm) },
                                yoy: { spend: calcShift(headlineStats.spend, headlinePyS.spend), mncs: calcShift(headlineStats.mncs, headlinePyS.mncs), payback: calcShift(headlineStats.payback, headlinePyS.payback), ltv: calcShift(headlineStats.ltv, headlinePyS.ltv), cpa: calcShift(headlineStats.cpa, headlinePyS.cpa), cm: calcShift(headlineStats.cm, headlinePyS.cm) }
                            }
                        } : null,
                        platformStats, 
                        breakDown: finalBreakDown.slice(0, 16), 
                        dimKey 
                    };
                };

                return { global: buildRegionalData('GLOBAL'), regions: REGIONS.map(r => buildRegionalData(r)).filter(r => r.stats.mncs > 0 || r.stats.spend > 0) };
            };

            const reportData = useMemo(() => buildReportDataForMonth(selectedMonth), [rawData, selectedMonth, headers]);

            const getMonthlyReportContext = (monthValue, dataOverride = null) => {
                const monthlyReportData = dataOverride || buildReportDataForMonth(monthValue);
                if (!monthlyReportData) return null;
                const monthName = getMoName(monthValue);
                const gacStats = monthlyReportData.global.platformStats.find(p => p.name === 'Google AC');
                const molocoStats = monthlyReportData.global.platformStats.find(p => p.name === 'Moloco');
                const ttdStats = monthlyReportData.global.platformStats.find(p => p.name === 'TTD');
                const defaultGlobal = `In ${monthName}, we drove ${monthlyReportData.global.stats.mncs.toLocaleString()} MNCs (${monthlyReportData.global.shifts.mom.mncs > 0 ? '+' : ''}${(monthlyReportData.global.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(monthlyReportData.global.stats.spend)} (${monthlyReportData.global.shifts.mom.spend > 0 ? '+' : ''}${(monthlyReportData.global.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${monthlyReportData.global.stats.payback.toFixed(1)}m (${monthlyReportData.global.shifts.mom.payback > 0 ? '+' : ''}${(monthlyReportData.global.shifts.mom.payback * 100).toFixed(1)}% MoM).`;
                const defaultGAC = gacStats ? `In ${monthName}, Google App Campaigns drove ${gacStats.mncs.toLocaleString()} MNCs (${gacStats.shifts.mom.mncs > 0 ? '+' : ''}${(gacStats.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(gacStats.spend)} (${gacStats.shifts.mom.spend > 0 ? '+' : ''}${(gacStats.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${gacStats.payback.toFixed(1)}m (${gacStats.shifts.mom.payback > 0 ? '+' : ''}${(gacStats.shifts.mom.payback * 100).toFixed(1)}% MoM).` : '';
                const defaultMoloco = molocoStats ? `In ${monthName}, Moloco drove ${molocoStats.mncs.toLocaleString()} MNCs (${molocoStats.shifts.mom.mncs > 0 ? '+' : ''}${(molocoStats.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(molocoStats.spend)} (${molocoStats.shifts.mom.spend > 0 ? '+' : ''}${(molocoStats.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${molocoStats.payback.toFixed(1)}m (${molocoStats.shifts.mom.payback > 0 ? '+' : ''}${(molocoStats.shifts.mom.payback * 100).toFixed(1)}% MoM).` : '';
                const defaultTTD = ttdStats ? `In ${monthName}, The Trade Desk drove ${ttdStats.mncs.toLocaleString()} MNCs (${ttdStats.shifts.mom.mncs > 0 ? '+' : ''}${(ttdStats.shifts.mom.mncs * 100).toFixed(1)}% MoM) with a total spend of ${fmtCompactCurr(ttdStats.spend)} (${ttdStats.shifts.mom.spend > 0 ? '+' : ''}${(ttdStats.shifts.mom.spend * 100).toFixed(1)}% MoM). This resulted in a payback of ${ttdStats.payback.toFixed(1)}m (${ttdStats.shifts.mom.payback > 0 ? '+' : ''}${(ttdStats.shifts.mom.payback * 100).toFixed(1)}% MoM).` : '';
                return {
                    monthValue,
                    reportData: monthlyReportData,
                    gacGlobalStats: gacStats,
                    molocoGlobalStats: molocoStats,
                    ttdGlobalStats: ttdStats,
                    defaultGlobalPerfText: defaultGlobal,
                    defaultGACPerfText: defaultGAC,
                    defaultMolocoPerfText: defaultMoloco,
                    defaultTTDPerfText: defaultTTD
                };
            };

            const currentReportContext = getMonthlyReportContext(selectedMonth, reportData);
            const globalHeadline = reportData?.global?.headline || (reportData?.global ? { stats: reportData.global.stats, shifts: reportData.global.shifts } : null);
            const gacGlobalStats = currentReportContext?.gacGlobalStats;
            const molocoGlobalStats = currentReportContext?.molocoGlobalStats;
            const ttdGlobalStats = currentReportContext?.ttdGlobalStats;

            const defaultGlobalPerfText = currentReportContext?.defaultGlobalPerfText || "";
            const defaultGACPerfText = currentReportContext?.defaultGACPerfText || "";
            const defaultMolocoPerfText = currentReportContext?.defaultMolocoPerfText || "";
            const defaultTTDPerfText = currentReportContext?.defaultTTDPerfText || "";

            const stripPlatformLabel = (value) => {
                const stripped = fixCommonText(value).replace(/^(Google AC|Google App Campaigns|GAC|Google|The Trade Desk|Trade Desk|TTD|Moloco)\s*[:>-]?\s*/i, '').trim();
                return stripped ? stripped.charAt(0).toUpperCase() + stripped.slice(1) : '';
            };

            const getRegionalPerformanceBase = (reg, platformUpdates = {}, reportContext = currentReportContext) => {
                const monthValue = reportContext?.monthValue || selectedMonth;
                const intro = `${getMoName(monthValue)} concluded in ${reg.name} with ${reg.stats.mncs.toLocaleString()} MNCs (${reg.shifts.mom.mncs > 0 ? '+' : ''}${(reg.shifts.mom.mncs * 100).toFixed(1)}% MoM) at a ${reg.stats.payback.toFixed(1)}-month payback.`;
                const platformSections = REGIONAL_NARRATIVE_SEQUENCE.map(meta => {
                    const p = reg.platformStats.find(platform => platform.name === meta.statName);
                    if (!p || p.mncs <= 0) return '';
                    const mainLine = `${meta.narrativeName} drove ${p.mncs.toLocaleString()} MNCs at a ${p.payback.toFixed(1)}-month payback with an LTV of £${p.ltv.toFixed(2)}.`;
                    const sheetNotes = (platformUpdates[meta.key] || []).map(stripPlatformLabel).filter(Boolean);
                    return [mainLine, ...sheetNotes].join('\n\n');
                }).filter(Boolean);
                const otherNotes = (platformUpdates.OTHER || []).map(fixCommonText).filter(Boolean);
                return [intro, ...platformSections, ...otherNotes].filter(Boolean).join('\n\n');
            };

            const getBasePerformanceForTarget = (target, reportContext = currentReportContext) => {
                if (target === 'GLOBAL') return reportContext?.defaultGlobalPerfText || '';
                if (target === 'GAC') return reportContext?.defaultGACPerfText || '';
                if (target === 'MOLOCO') return reportContext?.defaultMolocoPerfText || '';
                if (target === 'TTD') return reportContext?.defaultTTDPerfText || '';
                const reg = reportContext?.reportData?.regions?.find(r => r.name === target);
                return reg ? getRegionalPerformanceBase(reg, {}, reportContext) : '';
            };

            const normalizeKey = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');

            const normalizeUpdateTarget = (value) => {
                const key = normalizeKey(value);
                if (!key) return null;
                const aliases = {
                    latam: 'LATAM',
                    latinamerica: 'LATAM',
                    northam: 'NORTHAM',
                    northamerica: 'NORTHAM',
                    nam: 'NORTHAM',
                    na: 'NORTHAM',
                    europe: 'EUROPE',
                    eu: 'EUROPE',
                    asia: 'ASIA',
                    pacific: 'PACIFIC',
                    anz: 'PACIFIC',
                    australia: 'PACIFIC',
                    australianewzealand: 'PACIFIC',
                    gbr: 'GBR',
                    uk: 'GBR',
                    unitedkingdom: 'GBR',
                    mea: 'MEA',
                    middleeastafrica: 'MEA',
                    global: 'GLOBAL',
                    google: 'GAC',
                    googleac: 'GAC',
                    appcampaigns: 'GAC',
                    gac: 'GAC',
                    moloco: 'MOLOCO',
                    tradedesk: 'TTD',
                    thetradedesk: 'TTD',
                    ttd: 'TTD',
                    team: 'team_updates',
                    teamupdate: 'team_updates',
                    teamupdates: 'team_updates',
                    teamnews: 'team_updates',
                    peopleupdates: 'team_updates',
                    upcoming: 'upcoming_plans',
                    upcomingplan: 'upcoming_plans',
                    upcomingplans: 'upcoming_plans',
                    nextmonthplans: 'upcoming_plans',
                    nextsteps: 'upcoming_plans',
                    paiddisplayupdates: 'upcoming_plans'
                };
                if (REGIONS.includes(String(value).trim().toUpperCase())) return String(value).trim().toUpperCase();
                return aliases[key] || null;
            };

            const cleanUpdateText = (value) => String(value || '').trim().replace(/\r\n/g, '\n');

            const fixCommonText = (value) => {
                let text = cleanUpdateText(value);
                const replacements = [
                    [/\bIEarly\b/g, 'Early'],
                    [/\bregistrtions\b/gi, 'registrations'],
                    [/\bacttiviy\b/gi, 'activity'],
                    [/\bactiviy\b/gi, 'activity'],
                    [/\bslighly\b/gi, 'slightly'],
                    [/\bscalated\b/gi, 'scaled'],
                    [/\bscalate\b/gi, 'scale'],
                    [/\binAUS\b/g, 'in AUS'],
                    [/\ba in-platform\b/gi, 'an in-platform'],
                    [/\ba local\b/gi, 'a local'],
                    [/\bFull-funnel\b/g, 'full-funnel'],
                    [/\bcertainy\b/gi, 'certainty']
                ];
                replacements.forEach(([pattern, replacement]) => {
                    text = text.replace(pattern, replacement);
                });
                return text
                    .split('\n')
                    .map(line => line.trim().replace(/\s+/g, ' '))
                    .join('\n')
                    .replace(/\n{3,}/g, '\n\n')
                    .trim();
            };

            const polishPlanLine = (value) => {
                let line = fixCommonText(value).replace(/\s+/g, ' ').trim();
                const replacements = [
                    [/^Making\b/i, 'Make'],
                    [/^Continuing\b/i, 'Continue'],
                    [/^Adding\b/i, 'Add'],
                    [/^Starting\b/i, 'Start'],
                    [/^Updating\b/i, 'Update'],
                    [/^Keeping\b/i, 'Keep'],
                    [/^Testing\b/i, 'Test']
                ];
                replacements.forEach(([pattern, replacement]) => {
                    line = line.replace(pattern, replacement);
                });
                if (!line) return '';
                line = line.charAt(0).toUpperCase() + line.slice(1);
                return /[.!?]$/.test(line) ? line : `${line}.`;
            };

            const normalizePlanText = (value) => {
                const splitActionChunks = (line) => {
                    const chunks = line.split(/(?=\b(?:Continue|Make|Start|Reactivate|Keep|Launch|Update|Evaluate|Refine|Implement|Finalize|Maintain|Review|Test|Reevaluate|Hold|Scale)\b)/g)
                        .map(chunk => chunk.trim())
                        .filter(Boolean);
                    return chunks.length > 1 ? chunks : [line];
                };
                const lines = fixCommonText(value)
                    .replace(/\s+\d+[\.)]\s+/g, '\n')
                    .split('\n')
                    .flatMap(splitActionChunks)
                    .map(line => {
                        let text = line.trim().replace(/^(\d+[\.)]\s*)[-*•]\s*/, '');
                        text = text.replace(/^\d+[\.)]\s*/, '').replace(/^[-*•]\s*/, '').trim();
                        const polished = polishPlanLine(text);
                        return polished || '';
                    })
                    .filter(Boolean);
                return lines.join('\n\n');
            };

            const fitClamp = (value, min, max) => Math.max(min, Math.min(max, value));
            const fitLerp = (start, end, amount) => start + (end - start) * amount;
            const fitRatio = (fontSize, minFont, maxFont) => {
                if (maxFont === minFont) return 0;
                return fitClamp((maxFont - fontSize) / (maxFont - minFont), 0, 1);
            };
            const parsePx = (value) => Number.parseFloat(value) || 0;

            const getPlanFitConfig = (variant = 'standard') => {
                if (variant === 'large') return { maxFont: 20, minFont: 7.5, floorFont: 3.8, maxLine: 1.7, minLine: 1.12, maxGap: 1.05, minGap: 0.14 };
                if (variant === 'regional') return { maxFont: 15, minFont: 5.8, floorFont: 3.4, maxLine: 1.58, minLine: 1.08, maxGap: 0.95, minGap: 0.1 };
                return { maxFont: 14, minFont: 6, floorFont: 3.6, maxLine: 1.62, minLine: 1.08, maxGap: 0.95, minGap: 0.1 };
            };

            const getNarrativeFitConfig = (variant = 'standard') => {
                if (variant === 'regional') return { maxFont: 15, minFont: 4, floorFont: 0.85, maxLine: 1.5, minLine: 1.0 };
                return { maxFont: 15, minFont: 6.2, floorFont: 3.4, maxLine: 1.62, minLine: 1.08 };
            };

            const getPlanTextStyle = (variant = 'standard', fontSize = getPlanFitConfig(variant).maxFont) => {
                const config = getPlanFitConfig(variant);
                const shrink = fitRatio(fontSize, config.minFont, config.maxFont);
                return {
                    '--plan-font-size': `${fontSize.toFixed(2)}px`,
                    '--plan-line-height': fitLerp(config.maxLine, config.minLine, shrink).toFixed(3),
                    '--plan-item-gap': `${fitLerp(config.maxGap, config.minGap, shrink).toFixed(3)}rem`,
                    '--panel-padding-y': `${fitLerp(1.25, 0.62, shrink).toFixed(3)}rem`,
                    '--panel-padding-x': `${fitLerp(1.35, 0.82, shrink).toFixed(3)}rem`,
                    '--panel-header-gap': `${fitLerp(0.95, 0.34, shrink).toFixed(3)}rem`,
                    '--plan-bullet-track': `${fitLerp(0.92, 0.56, shrink).toFixed(3)}rem`,
                    '--plan-bullet-gap': `${fitLerp(0.48, 0.24, shrink).toFixed(3)}rem`,
                    '--text-fit-scale': '1'
                };
            };

            const getNarrativeTextStyle = (variant = 'standard', fontSize = getNarrativeFitConfig(variant).maxFont) => {
                const config = getNarrativeFitConfig(variant);
                const shrink = fitRatio(fontSize, config.minFont, config.maxFont);
                return {
                    '--narrative-font-size': `${fontSize.toFixed(2)}px`,
                    '--narrative-line-height': fitLerp(config.maxLine, config.minLine, shrink).toFixed(3),
                    '--panel-padding-y': `${fitLerp(1.25, 0.48, shrink).toFixed(3)}rem`,
                    '--panel-padding-x': `${fitLerp(1.35, 0.68, shrink).toFixed(3)}rem`,
                    '--panel-header-gap': `${fitLerp(0.95, 0.24, shrink).toFixed(3)}rem`,
                    '--story-paragraph-gap': `${fitLerp(0.78, 0.18, shrink).toFixed(3)}em`,
                    '--story-first-scale': `${fitLerp(1.06, 1.01, shrink).toFixed(3)}em`,
                    '--story-first-line-height': fitLerp(1.45, 1.08, shrink).toFixed(3),
                    '--text-fit-scale': '1'
                };
            };

            const estimateTextFitMaxFont = (mode, variant, text, config) => {
                const source = String(text || '').replace(/empty-(performance|plan)/g, '').trim();
                if (!source) return config.maxFont;

                const chunks = source
                    .split(/\n+/)
                    .map(chunk => chunk.trim())
                    .filter(Boolean);
                if (!chunks.length) return config.maxFont;

                const regional = variant === 'regional';
                const isPlan = mode === 'plan';
                const width = regional ? (isPlan ? 720 : 300) : (isPlan ? 760 : 680);
                const height = regional ? (isPlan ? 235 : 505) : (isPlan ? 250 : 220);
                const charWidth = isPlan ? 0.56 : 0.62;
                const bulletReserve = isPlan ? 28 : 0;
                const usableWidth = Math.max(120, width - bulletReserve);
                const lineHeight = isPlan ? Math.min(config.maxLine, 1.42) : Math.min(config.maxLine, 1.26);
                const paragraphGap = isPlan ? 0.75 : 0.62;
                let best = config.floorFont || config.minFont;

                for (let font = config.maxFont; font >= best; font -= 0.25) {
                    const charsPerLine = Math.max(8, Math.floor(usableWidth / (font * charWidth)));
                    const visualLines = chunks.reduce((total, chunk) => total + Math.max(1, Math.ceil(chunk.length / charsPerLine)), 0);
                    const neededHeight = (visualLines * font * lineHeight) + (Math.max(0, chunks.length - 1) * font * paragraphGap);
                    if (neededHeight <= height) return font;
                }

                return best;
            };

            const getPanelFitParts = (panelEl) => {
                const planViewport = panelEl.querySelector('.plan-list');
                const storyViewport = panelEl.querySelector('.story-copy');
                const planContent = panelEl.querySelector('.plan-list-inner');
                const storyContent = panelEl.querySelector('.story-copy-inner');
                const mode = planViewport && planContent ? 'plan' : 'narrative';
                return {
                    mode,
                    variant: panelEl.classList.contains('story-panel-regional') ? 'regional' : 'standard',
                    viewportEl: mode === 'plan' ? planViewport : storyViewport,
                    contentEl: mode === 'plan' ? planContent : storyContent
                };
            };

            const applyPanelFitVars = (panelEl, mode, variant, fontSize, scale = 1) => {
                const vars = mode === 'plan'
                    ? getPlanTextStyle(variant, fontSize)
                    : getNarrativeTextStyle(variant, fontSize);
                Object.entries({ ...vars, '--text-fit-scale': scale.toFixed(3) }).forEach(([key, value]) => {
                    panelEl.style.setProperty(key, value);
                });
            };

            const panelTextFits = (viewportEl, contentEl) => {
                if (!viewportEl || !contentEl) return true;
                const viewportRect = viewportEl.getBoundingClientRect();
                const contentRect = contentEl.getBoundingClientRect();
                const neededWidth = Math.max(contentEl.scrollWidth, contentRect.width);
                const neededHeight = Math.max(contentEl.scrollHeight, contentRect.height);
                return (
                    neededWidth <= viewportRect.width + 1 &&
                    neededHeight <= viewportRect.height + 1
                );
            };

            const fitRenderedPanelText = (panelEl) => {
                if (!panelEl?.isConnected) return;
                const { mode, variant, viewportEl, contentEl } = getPanelFitParts(panelEl);
                if (!viewportEl || !contentEl || viewportEl.clientWidth <= 1 || viewportEl.clientHeight <= 1) return;

                const getConfig = mode === 'plan' ? getPlanFitConfig : getNarrativeFitConfig;
                const baseConfig = getConfig(variant);
                const sourceText = contentEl.innerText || '';
                const maxFont = baseConfig.maxFont;
                const floorFont = baseConfig.floorFont || baseConfig.minFont;

                applyPanelFitVars(panelEl, mode, variant, maxFont, 1);
                if (panelTextFits(viewportEl, contentEl)) return;

                let best = floorFont;
                let low = floorFont;
                let high = maxFont;
                for (let i = 0; i < 14; i += 1) {
                    const mid = (low + high) / 2;
                    applyPanelFitVars(panelEl, mode, variant, mid, 1);
                    if (panelTextFits(viewportEl, contentEl)) {
                        best = mid;
                        low = mid;
                    } else {
                        high = mid;
                    }
                }

                applyPanelFitVars(panelEl, mode, variant, best, 1);
                if (panelTextFits(viewportEl, contentEl)) return;

                let emergencyFont = best;
                for (let i = 0; i < 18 && !panelTextFits(viewportEl, contentEl); i += 1) {
                    emergencyFont = Math.max(0.65, emergencyFont * 0.88);
                    applyPanelFitVars(panelEl, mode, variant, emergencyFont, 1);
                }
            };

            const fitAllRenderedPanelText = () => {
                document.querySelectorAll('.story-panel').forEach(fitRenderedPanelText);
            };

            const PANEL_FIT_STYLE_KEYS = [
                '--plan-font-size',
                '--plan-line-height',
                '--plan-item-gap',
                '--plan-bullet-track',
                '--plan-bullet-gap',
                '--narrative-font-size',
                '--narrative-line-height',
                '--story-paragraph-gap',
                '--story-first-scale',
                '--story-first-line-height',
                '--panel-padding-y',
                '--panel-padding-x',
                '--panel-header-gap',
                '--text-fit-scale'
            ];

            const readAppliedPanelFitStyle = (panelEl, contentKey) => {
                const next = { __contentKey: contentKey };
                PANEL_FIT_STYLE_KEYS.forEach(key => {
                    const value = panelEl.style.getPropertyValue(key);
                    if (value) next[key] = value;
                });
                return next;
            };

            const useAutoFitText = ({ mode, variant = 'standard', contentKey = '' }) => {
                const contentRef = React.useRef(null);
                const getVars = mode === 'plan' ? getPlanTextStyle : getNarrativeTextStyle;
                const getConfig = mode === 'plan' ? getPlanFitConfig : getNarrativeFitConfig;
                const initialConfig = getConfig(variant);
                const initialMaxFont = estimateTextFitMaxFont(mode, variant, contentKey, initialConfig);
                const estimatedStyle = React.useMemo(
                    () => ({ ...getVars(variant, initialMaxFont), __contentKey: contentKey }),
                    [mode, variant, contentKey, initialMaxFont]
                );
                const [fitStyle, setFitStyle] = React.useState(() => estimatedStyle);
                const visibleFitStyle = fitStyle.__contentKey === contentKey ? fitStyle : estimatedStyle;
                const { __contentKey, ...renderedFitStyle } = visibleFitStyle;

                React.useLayoutEffect(() => {
                    const contentEl = contentRef.current;
                    const viewportEl = contentEl?.parentElement;
                    const panelEl = contentEl?.closest('.story-panel');
                    if (!contentEl || !viewportEl || !panelEl) return undefined;

                    let frame = 0;
                    let disposed = false;
                    const baseConfig = getConfig(variant);
                    const config = {
                        ...baseConfig,
                        maxFont: baseConfig.maxFont
                    };
                    const applyVars = (vars) => {
                        Object.entries(vars).forEach(([key, value]) => {
                            if (key.startsWith('__')) return;
                            panelEl.style.setProperty(key, value);
                        });
                    };
                    const getAvailableBox = () => {
                        const panelStyle = window.getComputedStyle(panelEl);
                        const headerEl = panelEl.querySelector('.story-panel-header');
                        const headerStyle = headerEl ? window.getComputedStyle(headerEl) : null;
                        const headerHeight = headerEl ? headerEl.getBoundingClientRect().height : 0;
                        const headerGap = headerStyle ? parsePx(headerStyle.marginBottom) : 0;
                        const paddingX = parsePx(panelStyle.paddingLeft) + parsePx(panelStyle.paddingRight);
                        const paddingY = parsePx(panelStyle.paddingTop) + parsePx(panelStyle.paddingBottom);
                        return {
                            width: Math.max(1, panelEl.clientWidth - paddingX),
                            height: Math.max(1, panelEl.clientHeight - paddingY - headerHeight - headerGap)
                        };
                    };
                    const measureAt = (fontSize) => {
                        const vars = getVars(variant, fontSize);
                        applyVars(vars);
                        const available = getAvailableBox();
                        const measureEl = viewportEl.cloneNode(false);
                        const measureInner = contentEl.cloneNode(true);
                        measureEl.appendChild(measureInner);
                        Object.assign(measureEl.style, {
                            position: 'absolute',
                            visibility: 'hidden',
                            pointerEvents: 'none',
                            left: '-10000px',
                            top: '0',
                            width: `${available.width}px`,
                            height: 'auto',
                            maxHeight: 'none',
                            minHeight: '0',
                            overflow: 'visible',
                            flex: 'none',
                            zIndex: '-1'
                        });
                        panelEl.appendChild(measureEl);
                        const innerRect = measureInner.getBoundingClientRect();
                        const measureRect = measureEl.getBoundingClientRect();
                        const needed = {
                            width: Math.max(measureInner.scrollWidth, innerRect.width, measureEl.scrollWidth, measureRect.width),
                            height: Math.max(measureInner.scrollHeight, innerRect.height, measureEl.scrollHeight, measureRect.height)
                        };
                        measureEl.remove();
                        return { available, needed, vars };
                    };
                    const fitsAt = (fontSize) => {
                        const measurement = measureAt(fontSize);
                        return (
                            measurement.needed.height <= measurement.available.height + 0.5 &&
                            measurement.needed.width <= measurement.available.width + 0.5
                        );
                    };
                    const fit = () => {
                        if (disposed || !contentEl.isConnected || !panelEl.isConnected) return;
                        if (viewportEl.clientHeight <= 1 || viewportEl.clientWidth <= 1) return;

                        const floorFont = config.floorFont || config.minFont;
                        let best = floorFont;
                        let foundFit = false;
                        if (fitsAt(config.maxFont)) {
                            best = config.maxFont;
                            foundFit = true;
                        } else {
                            let low = floorFont;
                            let high = config.maxFont;
                            for (let i = 0; i < 16; i += 1) {
                                const mid = (low + high) / 2;
                                if (fitsAt(mid)) {
                                    best = mid;
                                    foundFit = true;
                                    low = mid;
                                } else {
                                    high = mid;
                                }
                            }

                            if (!foundFit) {
                                const finalMeasure = measureAt(best);
                                const fontScaleDown = Math.min(
                                    finalMeasure.available.height / Math.max(1, finalMeasure.needed.height),
                                    finalMeasure.available.width / Math.max(1, finalMeasure.needed.width)
                                );
                                best = Math.max(0.65, best * fontScaleDown * 0.94);
                            }
                        }

                        let nextStyle = {
                            ...getVars(variant, best),
                            '--text-fit-scale': '1',
                            __contentKey: contentKey
                        };
                        applyVars(nextStyle);
                        const actualContentRect = contentEl.getBoundingClientRect();
                        const actualViewportRect = viewportEl.getBoundingClientRect();
                        const actualNeededWidth = Math.max(contentEl.scrollWidth, actualContentRect.width);
                        const actualNeededHeight = Math.max(contentEl.scrollHeight, actualContentRect.height);
                        const actualScaleDown = Math.min(
                            actualViewportRect.height / Math.max(1, actualNeededHeight),
                            actualViewportRect.width / Math.max(1, actualNeededWidth)
                        );
                        if (actualScaleDown < 0.995) {
                            const adjustedFont = Math.max(0.65, best * actualScaleDown * 0.94);
                            nextStyle = {
                                ...getVars(variant, adjustedFont),
                                '--text-fit-scale': '1',
                                __contentKey: contentKey
                            };
                            applyVars(nextStyle);
                        }
                        fitRenderedPanelText(panelEl);
                        nextStyle = {
                            ...nextStyle,
                            ...readAppliedPanelFitStyle(panelEl, contentKey)
                        };
                        setFitStyle(previousStyle => {
                            const unchanged = Object.keys(nextStyle).every(key => previousStyle[key] === nextStyle[key]);
                            return unchanged ? previousStyle : nextStyle;
                        });
                    };
                    const scheduleFit = () => {
                        window.cancelAnimationFrame(frame);
                        frame = window.requestAnimationFrame(() => {
                            frame = window.requestAnimationFrame(fit);
                        });
                    };

                    const fitters = window.__paidDisplayPanelFitters || new Set();
                    window.__paidDisplayPanelFitters = fitters;
                    fitters.add(fit);
                    window.__fitPaidDisplayPanels = () => {
                        window.__paidDisplayPanelFitters?.forEach(fitter => fitter());
                        fitAllRenderedPanelText();
                    };

                    scheduleFit();
                    if (document.fonts?.ready) document.fonts.ready.then(scheduleFit).catch(() => {});

                    const observer = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(scheduleFit) : null;
                    observer?.observe(panelEl);
                    observer?.observe(viewportEl);
                    const mutationObserver = typeof MutationObserver !== 'undefined' ? new MutationObserver(scheduleFit) : null;
                    mutationObserver?.observe(contentEl, { childList: true, characterData: true, subtree: true });
                    window.addEventListener('resize', scheduleFit);
                    window.addEventListener('beforeprint', fit);

                    return () => {
                        disposed = true;
                        window.cancelAnimationFrame(frame);
                        fitters.delete(fit);
                        observer?.disconnect();
                        mutationObserver?.disconnect();
                        window.removeEventListener('resize', scheduleFit);
                        window.removeEventListener('beforeprint', fit);
                    };
                }, [mode, variant, contentKey]);

                return { contentRef, fitStyle: renderedFitStyle };
            };

            const cleanupNarratives = (source = {}) => Object.entries(source).reduce((acc, [key, value]) => {
                if (key.endsWith('_plan') || key === 'upcoming_plans') acc[key] = normalizePlanText(value);
                else acc[key] = fixCommonText(value);
                return acc;
            }, {});

            const labelUpdateText = (header, value) => {
                const text = cleanUpdateText(value);
                if (!text) return '';
                const meta = getPlatformMeta(header);
                if (meta?.key === 'GAC' && !/^(google|gac)\b/i.test(text)) return `Google AC: ${text}`;
                if (meta?.key === 'TTD' && !/^(ttd|the trade desk|trade desk)\b/i.test(text)) return `The Trade Desk: ${text}`;
                if (meta?.key === 'MOLOCO' && !/^moloco\b/i.test(text)) return `Moloco: ${text}`;
                return text;
            };

            const buildNarrativesFromUpdateRows = (rows, monthValue = selectedMonth, reportContext = getMonthlyReportContext(monthValue)) => {
                const monthlyReportData = reportContext?.reportData;
                if (!monthlyReportData || rows.length < 2) return {};
                const headers = rows[0].map(h => String(h || ''));
                const headerKeys = headers.map(normalizeKey);
                const targetIdx = headerKeys.findIndex(h => ['region', 'marketingregion', 'marketregion', 'geo', 'area', 'market', 'slide', 'section', 'platform', 'channel'].some(term => h.includes(term)));
                const teamIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && (h.includes('teamupdate') || h.includes('teamnews') || h === 'team'))
                    .map(({ idx }) => idx);
                const deckPlanIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && (h === 'upcomingplans' || h === 'upcomingplan' || h === 'nextsteps' || h === 'deckplans'))
                    .map(({ idx }) => idx);
                const planIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && !teamIdxs.includes(idx) && !deckPlanIdxs.includes(idx) && ['plan', 'nextmonth', 'upcoming', 'initiative', 'action'].some(term => h.includes(term)))
                    .map(({ idx }) => idx);
                const perfIdxs = headerKeys.map((h, idx) => ({ h, idx }))
                    .filter(({ h, idx }) => idx !== targetIdx && !planIdxs.includes(idx) && !teamIdxs.includes(idx) && !deckPlanIdxs.includes(idx) && ['performance', 'perf', 'update', 'summary', 'commentary', 'highlight', 'result', 'google', 'gac', 'moloco', 'ttd', 'tradedesk'].some(term => h.includes(term)))
                    .map(({ idx }) => idx);
                const updates = {};
                const slideUpdates = { team_updates: [], upcoming_plans: [] };

                const collectSpecialRow = (target, row) => {
                    const rowTexts = row
                        .map((cell, idx) => idx === targetIdx ? '' : cleanUpdateText(cell))
                        .filter(text => text.length > 1 && !normalizeUpdateTarget(text));
                    rowTexts.forEach(text => slideUpdates[target].push(text));
                };

                rows.slice(1).forEach(row => {
                    const target = normalizeUpdateTarget(row[targetIdx]) || row.map(normalizeUpdateTarget).find(Boolean);
                    teamIdxs.map(idx => cleanUpdateText(row[idx])).filter(Boolean).forEach(text => slideUpdates.team_updates.push(text));
                    deckPlanIdxs.map(idx => cleanUpdateText(row[idx])).filter(Boolean).forEach(text => slideUpdates.upcoming_plans.push(text));

                    if (target === 'team_updates' || target === 'upcoming_plans') {
                        collectSpecialRow(target, row);
                        return;
                    }

                    if (!target) return;
                    if (!updates[target]) updates[target] = { perf: [], plan: [], platformPerf: { GAC: [], TTD: [], MOLOCO: [], AVOW: [], OTHER: [] } };

                    const addPerformanceUpdate = (header, value) => {
                        const text = cleanUpdateText(value);
                        if (!text || text.length <= 8 || normalizeUpdateTarget(text)) return '';
                        const labeled = labelUpdateText(header, text);
                        const meta = getPlatformMeta(header) || getPlatformMeta(text);
                        const platformKey = meta?.key || 'OTHER';
                        if (!updates[target].platformPerf[platformKey]) updates[target].platformPerf[platformKey] = [];
                        updates[target].platformPerf[platformKey].push(labeled);
                        return labeled;
                    };

                    const performanceCells = perfIdxs.length
                        ? perfIdxs.map(idx => addPerformanceUpdate(headers[idx], row[idx]))
                        : row.map((cell, idx) => {
                            if (idx === targetIdx || planIdxs.includes(idx)) return '';
                            return addPerformanceUpdate(headers[idx] || '', cell);
                        });

                    const planCells = planIdxs.map(idx => cleanUpdateText(row[idx]));
                    performanceCells.filter(Boolean).forEach(text => updates[target].perf.push(text));
                    planCells.filter(Boolean).forEach(text => updates[target].plan.push(text));
                });

                const narrativeUpdates = Object.entries(updates).reduce((acc, [target, sections]) => {
                    const perf = [...new Set(sections.perf.map(cleanUpdateText).filter(Boolean))];
                    const plan = [...new Set(sections.plan.map(normalizePlanText).filter(Boolean))];
                    const base = getBasePerformanceForTarget(target, reportContext);
                    if (perf.length) {
                        if (REGIONS.includes(target)) {
                            const reg = monthlyReportData?.regions?.find(r => r.name === target);
                            acc[`${target}_perf`] = reg ? getRegionalPerformanceBase(reg, sections.platformPerf, reportContext) : fixCommonText(perf.join('\n\n'));
                        } else {
                            acc[`${target}_perf`] = base ? fixCommonText(`${base}\n\n${perf.join('\n\n')}`) : fixCommonText(perf.join('\n\n'));
                        }
                    }
                    if (plan.length) acc[`${target}_plan`] = plan.join('\n\n');
                    return acc;
                }, {});

                const teamUpdates = [...new Set(slideUpdates.team_updates.map(cleanUpdateText).filter(Boolean))];
                const upcomingPlans = [...new Set(slideUpdates.upcoming_plans.map(cleanUpdateText).filter(Boolean))];
                if (teamUpdates.length) narrativeUpdates.team_updates = teamUpdates.join('\n\n');
                if (upcomingPlans.length) narrativeUpdates.upcoming_plans = upcomingPlans.join('\n\n');

                return narrativeUpdates;
            };

            useEffect(() => {
                if (!selectedMonth || !reportData) return;

                const savedNarratives = narrativesByMonth[selectedMonth];
                if (savedNarratives) {
                    setNarratives(savedNarratives);
                    setNarrativeMonth(selectedMonth);
                    return;
                }

                const savedRows = performanceRowsByMonth[selectedMonth];
                if (savedRows) {
                    const updateNarratives = cleanupNarratives(buildNarrativesFromUpdateRows(savedRows, selectedMonth));
                    setNarratives(updateNarratives);
                    setNarrativesByMonth(prev => ({ ...prev, [selectedMonth]: updateNarratives }));
                    setNarrativeMonth(selectedMonth);
                    return;
                }

                setNarratives({});
                setNarrativeMonth('');
                }, [selectedMonth, reportData, performanceRowsByMonth, narrativesByMonth]);

            useEffect(() => {
                if (!setupComplete) return undefined;
                const forceFit = () => {
                    window.__fitPaidDisplayPanels?.();
                    fitAllRenderedPanelText();
                };
                const delays = [30, 90, 180, 360, 700, 1200, 1900];
                const timers = delays.map(delay => window.setTimeout(forceFit, delay));
                if (document.fonts?.ready) {
                    document.fonts.ready.then(() => {
                        forceFit();
                        window.requestAnimationFrame(forceFit);
                    }).catch(() => {});
                }
                const beforePrint = () => {
                    forceFit();
                    window.requestAnimationFrame(forceFit);
                    [30, 90, 180, 320].forEach(delay => window.setTimeout(forceFit, delay));
                };
                window.addEventListener('beforeprint', beforePrint);
                return () => {
                    timers.forEach(timer => window.clearTimeout(timer));
                    window.removeEventListener('beforeprint', beforePrint);
                };
            }, [setupComplete, selectedMonth, narratives, narrativesByMonth, narrativeMonth]);

            const uploadLightdashDataStep = async () => {
                const { rows, source } = await loadRowsFromGoogleOrCache(LIGHTDASH_SHEET_ID, null, null);
                if (rows.length < 2) throw new Error('No Lightdash rows were found in the Google Sheet.');
                const finalData = processCSVText(sheetRowsToCSV(rows));
                const months = [...new Set(finalData.map(d => d.date))].sort().reverse();
                const monthValue = months[0] || 'No Date';
                return {
                    dataRows: finalData,
                    months,
                    monthValue,
                    message: `Uploaded ${finalData.length.toLocaleString()} Lightdash rows from ${source}.`
                };
            };

            const uploadPerformanceUpdatesStep = async ({ dataRows = rawData, months: monthsOverride = reportMonths, monthValue = selectedMonth } = {}) => {
                const currentReportData = buildReportDataForMonth(monthValue, dataRows);
                if (!dataRows.length || !currentReportData) throw new Error('Upload Lightdash data first so the tool can choose the correct month tab.');
                const months = monthsOverride.length ? monthsOverride : [monthValue];
                const loadedRowsByMonth = {};
                const loadedTabsByMonth = {};
                let sourceName = 'Wise data bridge';
                let loadedViaBridgeIndex = false;

                try {
                    const { source, tabs } = await loadAllPerformanceUpdateTabs(months);
                    sourceName = source || sourceName;
                    loadedViaBridgeIndex = true;
                    tabs.forEach(tab => {
                        if (tab.matchedMonth && months.includes(tab.matchedMonth)) {
                            loadedRowsByMonth[tab.matchedMonth] = tab.rows;
                            loadedTabsByMonth[tab.matchedMonth] = tab.name;
                        }
                    });
                    months.forEach(month => {
                        if (loadedRowsByMonth[month]) return;
                        const match = findPerformanceTabForMonth(tabs, month);
                        if (match) {
                            loadedRowsByMonth[month] = match.rows;
                            loadedTabsByMonth[month] = match.name;
                        }
                    });
                } catch (err) {
                    console.warn(err);
                }

                if (!loadedViaBridgeIndex) {
                    const fallbackResults = await Promise.allSettled(months.map(async month => {
                        if (loadedRowsByMonth[month]) return null;
                        const { rows, source, tabName } = await loadPerformanceUpdateRows(month);
                        return { month, rows, source, tabName };
                    }));
                    fallbackResults.forEach(result => {
                        if (result.status !== 'fulfilled' || !result.value) {
                            if (result.status === 'rejected') console.warn(result.reason);
                            return;
                        }
                        const { month, rows, source, tabName } = result.value;
                        loadedRowsByMonth[month] = rows;
                        loadedTabsByMonth[month] = tabName;
                        sourceName = source || sourceName;
                    });
                }

                if (!loadedRowsByMonth[monthValue]) {
                    throw new Error(`No Performance Updates tab was found for ${getPerformanceUpdateTabName(monthValue)}. Check the tab name in the Performance Updates Sheet.`);
                }

                const builtNarrativesByMonth = {};
                Object.entries(loadedRowsByMonth).forEach(([month, rows]) => {
                    const monthReportData = buildReportDataForMonth(month, dataRows);
                    const monthContext = getMonthlyReportContext(month, monthReportData);
                    if (!monthContext) return;
                    const updateNarratives = cleanupNarratives(buildNarrativesFromUpdateRows(rows, month, monthContext));
                    if (Object.keys(updateNarratives).length) {
                        builtNarrativesByMonth[month] = updateNarratives;
                    }
                });

                const selectedTabName = loadedTabsByMonth[monthValue];
                if (!builtNarrativesByMonth[monthValue]) {
                    throw new Error(`No usable updates were found in the ${selectedTabName} tab. Check the tab name and column labels.`);
                }

                setPerformanceRowsByMonth(prev => ({ ...prev, ...loadedRowsByMonth }));
                setPerformanceTabsByMonth(prev => ({ ...prev, ...loadedTabsByMonth }));
                setNarrativesByMonth(prev => ({ ...prev, ...builtNarrativesByMonth }));
                setNarratives(builtNarrativesByMonth[monthValue]);
                setNarrativeMonth(monthValue);
                const loadedCount = Object.keys(loadedRowsByMonth).length;
                const preparedCount = Object.keys(builtNarrativesByMonth).length;
                const skippedCount = Math.max(0, months.length - loadedCount);
                return {
                    loadedRowsByMonth,
                    loadedTabsByMonth,
                    builtNarrativesByMonth,
                    message: `Uploaded all Performance Updates from ${sourceName}. Prepared ${preparedCount} month report${preparedCount === 1 ? '' : 's'}${skippedCount ? `; skipped ${skippedCount} month${skippedCount === 1 ? '' : 's'} without tabs` : ''}.`
                };

            const splitNotes = (text) => cleanUpdateText(text)
                .split(/\n+|[.!?]\s+/)
                .map(note => note.replace(/^-+\s*/, '').trim())

            const containsAny = (text, terms) => {

            const CONTEXT_TERMS = [

                'LTV',

                'MNC'

            const isVagueOperationalNote = (text) => {
                const clean = String(text || '').trim();
                if (!clean) return false;
                const mentionsOperationalLever = /\b(bid|bids|budget|budgets|adjustment|adjustments|change|changes|optimisation|optimization|better position|improve performance)\b/i.test(clean);
                if (!mentionsOperationalLever) return false;
                const hasContext = containsAny(clean, CONTEXT_TERMS);

            const contextualizeOperationalNote = (text, reportContext = currentReportContext) => {
                const clean = fixCommonText(text);
                if (!isVagueOperationalNote(clean)) return clean;
                const regions = [...(reportContext?.reportData?.regions || [])].filter(region => region.stats?.mncs > 0);
                const growthRegions = [...regions]
                    .sort((a, b) => (b.shifts?.mom?.mncs || 0) - (a.shifts?.mom?.mncs || 0))
                    .slice(0, 2)
                    .map(region => region.name)
                    .join(' and ');
                const softerRegions = [...regions]
                    .sort((a, b) => (a.shifts?.mom?.mncs || 0) - (b.shifts?.mom?.mncs || 0))
                    .slice(0, 2)
                    .map(region => region.name)
                    .join(' and ');
                const platformNames = (reportContext?.reportData?.global?.platformStats || [])
                    .filter(platform => platform.mncs > 0 || platform.spend > 0)
                    .map(platform => getPlatformMeta(platform.name)?.narrativeName || platform.name)
                    .slice(0, 3)
                    .join(', ');
                return `Operational bid and budget changes were focused across ${platformNames || 'the active Paid Display platforms'} to support growth in ${growthRegions || 'stronger regions'} while correcting softer trends in ${softerRegions || 'underperforming markets'} and protecting payback efficiency.`;
            };

            const polishPerformanceOverviewText = (text, reportContext = currentReportContext) => {
                const paragraphs = splitNarrativeBlocks(text);
                return paragraphs.map(paragraph => {
                    const sentences = paragraph
                        .split(/(?<=[.!?])\s+/)
                        .map(sentence => sentence.trim())
                        .filter(Boolean)
                        .map(sentence => isVagueOperationalNote(sentence)
                            ? contextualizeOperationalNote(sentence, reportContext)
                            : fixCommonText(sentence));
                    return [...new Set(sentences)].join(' ');
                }).filter(Boolean).join('\n\n');
            };

            const regionTextBundle = (regionName, sourceNarratives = narratives) => [
                sourceNarratives[`${regionName}_perf`] || '',
                sourceNarratives[`${regionName}_plan`] || ''
            ].filter(Boolean).join(' ');

            const buildStrategicPlanLines = (targets = [], sourceNarratives = narratives) => {
                const allText = REGIONS.map(region => regionTextBundle(region, sourceNarratives)).join(' ');
                const regionText = Object.fromEntries(REGIONS.map(region => [region, regionTextBundle(region, sourceNarratives)]));
                const targetKeys = targets.map(target => String(target).toLowerCase());
                const isGlobal = !targetKeys.length;
                const isGAC = targetKeys.some(key => ['google', 'gac', 'google ac', 'google app campaigns'].includes(key));
                const isMoloco = targetKeys.some(key => key.includes('moloco'));
                const isTTD = targetKeys.some(key => key.includes('ttd') || key.includes('trade desk') || key.includes('programmatic') || key.includes('video'));
                const lines = [];

                if (isGlobal) {
                    if (containsAny(regionText.ASIA, ['Malaysia', 'Philippines', 'Singapore', 'Japan', 'scaling', 'video consideration'])) {

            const collectPlanLines = (targets = [], sourceNarratives = narratives, reportContext = currentReportContext) => {

            const describeRegionalVariance = (reportContext = currentReportContext) => {

            const generateMonthlySummaries = async (sourceNarratives = narratives, monthValue = selectedMonth, reportDataOverride = null) => {

            const runWithConcurrency = async (items, limit, worker) => {
                const results = new Array(items.length);

                const workers = Array.from({ length: Math.min(limit, items.length) }, async () => {
                    while (nextIndex < items.length) {
                        const currentIndex = nextIndex;
                        nextIndex += 1;
                        results[currentIndex] = await worker(items[currentIndex], currentIndex);
                    }
                });
                await Promise.all(workers);
                return results;

            const formatSlackList = (items) => {

            const splitSummarySentences = (value) => fixCommonText(value)
                .replace(/\n+/g, ' ')
                .split(/(?<=[.!?])\s+/)

                .filter(Boolean);

                const text = String(value || '').replace(/\s+/g, ' ').trim();
                if (text.length <= maxLength) return text;
                const sentences = text
                    .match(/[^.!?]+[.!?]+|[^.!?]+$/g)
                    ?.map(sentence => finishSlackSentence(sentence))
                    .filter(Boolean) || [];
                const picked = [];
                sentences.forEach(sentence => {
                    if (!sentence || picked.length >= 3) return;
                    const candidate = [...picked, sentence].join(' ');
                    if (candidate.length <= maxLength || !picked.length) picked.push(sentence);
                });
                return picked.join(' ') || text;
            };

            const buildBoundedSentenceSummary = (sentences, maxLength = 430, maxSentences = 3) => {
                const unique = [];
                sentences.map(finishSlackSentence).filter(Boolean).forEach(sentence => {
                    if (!unique.includes(sentence)) unique.push(sentence);
                });
                const picked = [];
                unique.forEach(sentence => {
                    if (picked.length >= maxSentences) return;
                    const candidate = [...picked, sentence].join(' ');
                    if (candidate.length <= maxLength || !picked.length) picked.push(sentence);

            const getPlatformNameFromText = (value) => {

            };

            const hasSlackActionContext = (sentence) => {
                const clean = String(sentence || '').trim();

                    ...CONTEXT_TERMS,

                    'CE2',

                return hasNamedContext || hasMetricContext;

            const isSlackReadySentence = (sentence) => {
                const clean = String(sentence || '').trim();

                const clean = fixCommonText(value)
                    .replace(/\s+/g, ' ')
                    .replace(/\s+([,.!?])/g, '$1')

                return /[.!?]$/.test(clean) ? clean : `${clean}.`;

            const escapeRegExp = (value) => String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

                let clean = fixCommonText(sentence).replace(/\s+/g, ' ').trim();
