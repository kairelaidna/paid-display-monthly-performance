                    [/\bwe have been adjusting the tCPA downward\b/gi, 'we adjusted tCPA down'],
                    [/\binventory mix remains weighted toward Search inventory\b/gi, 'inventory mix remained Search-heavy'],
                    [/\bthe split hasn't expanded\b/gi, 'the split did not expand'],
                    [/,\s+and although the inventory mix remained Search-heavy,\s+the split did not expand\b/gi, ', but Search-heavy inventory kept the mix from expanding as much as expected'],
                    [/\bto bring the channel closer to our 15-month payback goal; however, because the CVR also dropped, the payback period hasn't come down as fast as hoped\b/gi, 'to move closer to the 15-month payback goal, but lower CVR slowed payback improvement'],
                    [/\bto bring the channel closer to\.$/gi, 'to move closer to the payback target, but lower CVR slowed payback improvement.'],
                    [/\bWe run an in-platform\b/g, 'We ran an in-platform'],
                    [/\bwe run an in-platform\b/gi, 'we ran an in-platform'],
                    [/\bduring in-platform conversion lift test\b/gi, 'during the in-platform conversion lift test'],
                    [/\bstart looking programmatic activities more from Full-funnel perspective\b/gi, 'evaluate programmatic activity through a full-funnel lens'],
                    [/\bNeed to retest after changes have been implemented\b/g, 'We need to retest after the changes are implemented'],
                    [/\bWebsite visit retargeting did not show any incremental value\b/gi, 'Website visit retargeting did not show incremental value, so the next read needs to focus on full-funnel in-app and video strategies'],
                    [/\bStable 100k per month at this point\b/gi, 'Spend is staying at £100k per month for now'],
                    [/\bStable spend levels due to ongoing UF flight\b/gi, 'Spend stayed stable because of the ongoing UF flight'],
                    [/\bmaintained flat spend levels\b/gi, 'kept spend flat'],
                    [/\bprotect the integrity of\b/gi, 'protect the read from'],
                    [/\bsolidify our understanding of the channel's baseline value\b/gi, 'understand the channel baseline before scaling further'],
                    [/\bmore certainty in incrementality\b/gi, 'more certainty on incrementality'],
                    [/\bmore certainity\b/gi, 'more certainty']
                ];
                replacements.forEach(([pattern, replacement]) => {
                    clean = clean.replace(pattern, replacement);
                });
                return finishSlackSentence(clean);
            };

            const foldPlatformIntoRegionalSlackSentence = (sentence, platformName, region = null) => {
                const clean = polishRegionalSlackSentence(sentence, region);
                if (!platformName || containsAny(clean, ['Google AC', 'Google App Campaigns', 'GAC', 'The Trade Desk', 'TTD', 'Moloco'])) return clean;
                const base = sentenceWithoutEnding(clean);
                if (!base) return clean;

                if (/^stable spend during\s+/i.test(base)) {
                    const detail = base.replace(/^stable spend during\s+/i, '');
                    return polishRegionalSlackSentence(`We kept ${platformName} spend stable during ${detail} so we could get a cleaner read on performance.`, region);
                }

                if (/^stable spend until\s+/i.test(base)) {
                    const detail = base.replace(/^stable spend until\s+/i, '');
                    return polishRegionalSlackSentence(`We kept ${platformName} spend stable until ${detail}.`, region);
                }

                if (/^have not scaled\s+/i.test(base)) {
                    const detail = base.replace(/^have not scaled\s*/i, '').trim();
                    return polishRegionalSlackSentence(`We have not scaled ${platformName}${detail ? ` ${detail}` : ''}.`, region);
                }

                if (/^kept budget/i.test(base) || /^maintained/i.test(base)) {
                    return polishRegionalSlackSentence(`${base} on ${platformName}.`, region);
                }

                if (/^we\s+/i.test(base)) {
                    const sentenceWithPlatform = /(\bto\b|\bwhile\b|\bbecause\b|\bdue to\b)/i.test(base)
                        ? base.replace(/(\bto\b|\bwhile\b|\bbecause\b|\bdue to\b)/i, `on ${platformName} $1`)
                        : `${base} on ${platformName}`;
                    return polishRegionalSlackSentence(`${sentenceWithPlatform.charAt(0).toLowerCase()}${sentenceWithPlatform.slice(1)}.`, region);
                }

                if (/^in\s+/i.test(base)) {
                    return polishRegionalSlackSentence(`${base} on ${platformName}.`, region);
                }

                return polishRegionalSlackSentence(`${base} on ${platformName}.`, region);
            };

            const buildFallbackSlackStory = (region, maxLength = 270) => {
                if (!region) return '';
                const activePlatforms = (region.platformStats || [])
                    .filter(platform => platform.name !== 'Avow' && (platform.mncs > 0 || platform.spend > 0))
                    .sort((a, b) => b.mncs - a.mncs);
                if (!activePlatforms.length) return '';
                const top = activePlatforms[0];
                const second = activePlatforms[1];
                const topName = getPlatformMeta(top.name)?.narrativeName || top.name;
                const secondName = second ? (getPlatformMeta(second.name)?.narrativeName || second.name) : '';
                const movement = isFinite(region.shifts?.mom?.mncs)
                    ? `Region MNCs ${region.shifts.mom.mncs >= 0 ? 'grew' : 'declined'} ${Math.abs(region.shifts.mom.mncs * 100).toFixed(1)}% MoM`
                    : `${region.name} performance`;
                const topLine = `${topName} was the largest platform contributor at ${formatSlackRegionMncs(top.mncs)} MNCs and a ${top.payback.toFixed(1)}m payback`;
                const secondLine = second ? `, followed by ${secondName} with ${formatSlackRegionMncs(second.mncs)} MNCs at a ${second.payback.toFixed(1)}m payback` : '';
                return trimSummaryText(`${movement}. ${topLine}${secondLine}.`, maxLength);
            };

            const getSummaryStory = (value, maxLength = 430, region = null) => {
                const kpiPattern = /\b(concluded|drove [\d,.]+ MNCs|payback with an LTV|with a total spend|resulted in a payback|month payback with an LTV)\b/i;
                const actionPattern = /\b(scale|scaled|scaling|test|incrementality|conversion lift|launched|maintained|stable|budget|creative|World Cup|CTV|Spotify|full-funnel|targeting|turned off|reactivate|record|calibration|payback|LTV|CPA)\b/i;
                let currentPlatform = '';
                const sentenceItems = fixCommonText(value)
                    .split(/\n+/)
                    .flatMap(block => {
                        const cleanBlock = block.replace(/^-+\s*/, '').trim();
                        if (!cleanBlock) return [];
                        const platformName = getPlatformNameFromText(cleanBlock);
                        if (/^(Google AC|Google App Campaigns|GAC|The Trade Desk|TTD|Moloco)\b/i.test(cleanBlock) && platformName) {
                            currentPlatform = platformName;
                        }
                        return splitSummarySentences(cleanBlock).map(sentence => {
                            const cleanSentence = sentence.trim();
                            const needsPlatformContext = currentPlatform
                                && !containsAny(cleanSentence, ['Google AC', 'Google App Campaigns', 'GAC', 'The Trade Desk', 'TTD', 'Moloco'])
                                && actionPattern.test(cleanSentence);
                            return needsPlatformContext
                                ? foldPlatformIntoRegionalSlackSentence(cleanSentence, currentPlatform, region)
                                : polishRegionalSlackSentence(cleanSentence, region);
                        }).map(text => ({ text, platform: currentPlatform }));
                    })
                    .filter(({ text }) => !kpiPattern.test(text))
                    .filter(({ text }) => isSlackReadySentence(text));
                const priority = sentenceItems.filter(({ text }) => actionPattern.test(text));
                const candidates = priority.length ? priority : sentenceItems;
                const availablePlatforms = new Set(candidates.map(item => item.platform).filter(Boolean));
                const picked = [];
                const seenPlatforms = new Set();

                candidates.forEach(item => {
                    if (picked.length >= 3) return;
                    if (picked.length < Math.min(2, availablePlatforms.size) && item.platform && seenPlatforms.has(item.platform)) return;
                    if (picked.some(existing => existing.text === item.text)) return;
                    picked.push(item);
                    if (item.platform) seenPlatforms.add(item.platform);
                });

                candidates.forEach(item => {
                    if (picked.length >= 3) return;
                    if (picked.some(existing => existing.text === item.text)) return;
                    picked.push(item);
                });

                return buildBoundedSentenceSummary(picked.map(item => item.text), maxLength, 3) || buildFallbackSlackStory(region, maxLength);
            };

            const getGeneratedSlackStory = (value, maxLength = 620, region = null) => {
                const regionName = region?.name || '';
                const regionPattern = regionName ? escapeRegExp(regionName) : '';
                const sentences = splitSummarySentences(value)
                    .map(sentence => {
                        let clean = sentence.replace(/^\*{0,2}[^:*]+?\*{0,2}:\s*/, '').trim();
                        if (regionPattern) clean = clean.replace(new RegExp(`^${regionPattern}:?\\s*`, 'i'), '').trim();
                        if (/^concluded with\b/i.test(clean) || /^concluded in\b/i.test(clean)) return '';
                        return polishRegionalSlackSentence(clean, region);
                    })
                    .filter(Boolean)
                    .filter(sentence => !isGenericSlackSentence(sentence));
                return buildBoundedSentenceSummary(sentences, maxLength, 4);
            };

            const getSummaryPlan = (value, maxLength = 255) => {
                const lines = normalizePlanText(value)
                    .split(/\n+/)
                    .map(line => line.trim())
                    .filter(Boolean);
                return trimSummaryText(lines.slice(0, 2).join(' '), maxLength);
            };

            const buildSlackSummaryText = () => {
                if (!reportData || !globalHeadline) return '';
                const monthLabel = formatFullMonthYear(selectedMonth);
                const nextMonthLabel = formatNextFullMonthYear(selectedMonth);
                const topDrivers = [...reportData.regions]
                    .filter(region => region.stats.mncs > 0)
                    .sort((a, b) => b.stats.mncs - a.stats.mncs)
                    .slice(0, 3);
                const driverFlags = topDrivers.map(region => REGION_SLACK_FLAGS[region.name] || '').join('');
                const driverNames = formatSlackList(topDrivers.map(region => region.name));
                const summaryRegions = reportData.regions.filter(region => region.stats.mncs > 0 || activeNarratives[`${region.name}_perf`] || activeNarratives[`${region.name}_plan`]);
                const highlightLines = summaryRegions.map(region => {
                    const paybackText = region.stats.payback > 0.05 ? ` at a ${region.stats.payback.toFixed(1)}m payback` : '';
                    const story = getGeneratedSlackStory(activeNarratives[`${region.name}_slack`] || '', 620, region)
                        || getSummaryStory(activeNarratives[`${region.name}_perf`] || getRegionalPerformanceBase(region, {}, currentReportContext), 560, region);
                    return `${region.name}: Concluded with ${formatSlackRegionMncs(region.stats.mncs)} MNCs${paybackText}.${story ? ` ${story}` : ''}`;
                });
                const planLines = summaryRegions
                    .map(region => {
                        const plan = getSummaryPlan(activeNarratives[`${region.name}_plan`] || '');
                        return plan ? `${region.name}: ${plan}` : '';
                    })
                    .filter(Boolean);
                const weekday = new Date().toLocaleDateString('en-GB', { weekday: 'long' });

                return [
                    `Hey! Happy ${weekday}! :pikachu_wave:`,
                    '',
                    `Sharing the Paid Display ${monthLabel} Monthly Report.`,
                    '',
                    ':sparkles:Key Highlights:',
                    '',
                    `:rocket:Paid Display drove ${Math.round(globalHeadline.stats.mncs).toLocaleString()} MNCs at a ${globalHeadline.stats.payback.toFixed(1)}m payback.`,
                    `${driverFlags} Our main conversion drivers were ${driverNames}.`,
                    '',
                    '',
                    `:test_tube: Main Highlights from ${getMoName(selectedMonth)}:`,
                    '',
                    ...highlightLines,
                    '',
                    '',
                    `:schedule-1: ${nextMonthLabel.split(' ')[0]} Plans:`,
                    '',
                    ...(planLines.length ? planLines : ['-']),
                    '',
                    '',
                    ':slack: Feel free to leave a comment or reach out to @paiddisplay on #askdisplay if you have any questions!'
                ].join('\n');
            };

            const copyTextToClipboard = async (text) => {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(text);
                    return;
                }

                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '0';
                document.body.appendChild(textarea);
                textarea.select();
                const copied = document.execCommand('copy');
                textarea.remove();
                if (!copied) throw new Error('Clipboard copy failed.');
            };

            const handleCopySummary = async () => {
                const summaryText = buildSlackSummaryText();
                if (!summaryText) return;

                try {
                    await copyTextToClipboard(summaryText);
                    setSummaryCopied(true);
                    window.setTimeout(() => setSummaryCopied(false), 1800);
                } catch (error) {
                    console.error(error);
                    window.alert('Could not copy the summary automatically. Please try again from Chrome.');
                }
            };

            const waitForFrame = () => new Promise(resolve => {
                window.requestAnimationFrame(() => window.requestAnimationFrame(resolve));
            });

            const waitMs = (delay) => new Promise(resolve => window.setTimeout(resolve, delay));

            const runPdfExportFit = async () => {
                document.body.classList.add('pdf-export-prep');
                await waitForFrame();
                window.__fitPaidDisplayPanels?.();
                fitAllRenderedPanelText();
                await waitMs(80);
                window.__fitPaidDisplayPanels?.();
                fitAllRenderedPanelText();
                await waitForFrame();
                window.__fitPaidDisplayPanels?.();
                fitAllRenderedPanelText();
            };

            const handleExportDeck = async () => {
                const cleanup = () => document.body.classList.remove('pdf-export-prep');
                window.addEventListener('afterprint', cleanup, { once: true });
                try {
                    await runPdfExportFit();
                    window.print();
                    window.setTimeout(cleanup, 1800);
                } catch (error) {
                    cleanup();
                    throw error;
                }
            };

            const handleGenerateMonthlyReport = () => runActionWithProgress('report', async (setProgress) => {
                setProgress(5, 'Uploading Lightdash data from Wise data bridge...');
                const lightdashResult = await uploadLightdashDataStep();

                setProgress(28, 'Uploading Performance Updates from Wise data bridge...');
                const updatesResult = await uploadPerformanceUpdatesStep(lightdashResult);

                setProgress(55, 'Generating summaries for available months...');
                const monthsToGenerate = lightdashResult.months.filter(month => updatesResult.builtNarrativesByMonth[month] || updatesResult.loadedRowsByMonth[month]);
                const targetMonths = monthsToGenerate.length ? monthsToGenerate : [lightdashResult.monthValue];
                let usedAI = 0;
                let usedLocal = 0;
                let completedMonths = 0;

                const messages = await runWithConcurrency(targetMonths, SUMMARY_GENERATION_CONCURRENCY, async (month) => {
                    const monthReportData = buildReportDataForMonth(month, lightdashResult.dataRows);
                    const monthContext = getMonthlyReportContext(month, monthReportData);
                    const sourceNarratives = updatesResult.builtNarrativesByMonth[month]
                        || cleanupNarratives(buildNarrativesFromUpdateRows(updatesResult.loadedRowsByMonth[month] || [], month, monthContext));
                    const message = await generateMonthlySummaries(sourceNarratives, month, monthReportData);
                    if (!message) throw new Error(`Could not generate summaries for ${month}.`);
                    completedMonths += 1;
                    setProgress(58 + (completedMonths / Math.max(1, targetMonths.length)) * 36, `Generated ${completedMonths}/${targetMonths.length} monthly reports...`);
                    return message;
                });

                messages.forEach(message => {
                    if (message.includes('AI summaries')) usedAI += 1;
                    else usedLocal += 1;
                });

                setProgress(96, 'Opening latest report...');
                setSetupComplete(true);
                [60, 220, 520, 1000].forEach(delay => {
                    window.setTimeout(() => {
                        window.__fitPaidDisplayPanels?.();
                        fitAllRenderedPanelText();
                    }, delay);
                });
                return `Generated ready-to-export reports for ${targetMonths.length} month${targetMonths.length === 1 ? '' : 's'}${usedAI ? ` with AI summaries for ${usedAI}` : ''}${usedLocal ? ` and local drafts for ${usedLocal}` : ''}.`;
            });

            const resetSetup = () => {
                setRawData([]);
                setHeaders([]);
                setSelectedMonth('');
                setNarratives({});
                setNarrativesByMonth({});
                setPerformanceRowsByMonth({});
                setPerformanceTabsByMonth({});
                setNarrativeMonth('');
                setApiKey('');
                setSetupComplete(false);
                setActionState({
                    lightdash: { status: 'idle', progress: 0, message: '' },
                    updates: { status: 'idle', progress: 0, message: '' },
                    report: { status: 'idle', progress: 0, message: '' }
                });
            };

            const ActionButton = ({ actionKey, idleLabel, loadingLabel, doneLabel, onClick, disabled = false, icon }) => {
                const state = actionState[actionKey];
                const label = state.status === 'loading' ? `${state.progress}% ${loadingLabel}` : (state.status === 'done' ? doneLabel : idleLabel);
                const active = state.status === 'loading' || state.status === 'done';
                const progressWidth = active ? `${Math.max(0, Math.min(100, state.status === 'done' ? 100 : state.progress))}%` : '0%';

                return (
                    <div>
                        <button
                            type="button"
                            onClick={onClick}
                            disabled={disabled || state.status === 'loading'}
                            className={`relative block w-full py-5 rounded-[2rem] font-black uppercase text-sm tracking-widest transition-all border border-white/10 overflow-hidden bg-white/10 ${active ? 'text-wise-forest' : 'text-white'} ${disabled ? 'opacity-40 cursor-not-allowed' : 'hover:bg-white/20 hover:scale-[1.02] active:scale-95'}`}
                        >
                            <span
                                className="absolute inset-y-0 left-0 bg-wise-fast transition-[width] duration-300 ease-out"
                                style={{ width: progressWidth }}
                            />
                            <span className="relative z-10 flex items-center justify-center gap-3">
                                {state.status === 'loading' ? <Icons.Loader size={18} /> : icon}
                                {label}
                            </span>
                        </button>
                        {state.message && (
                            <p className={`mt-3 text-xs font-bold leading-relaxed ${state.status === 'error' ? 'text-red-200' : 'text-white/55'}`}>{state.message}</p>
                        )}
                    </div>
                );
            };

            const activeNarratives = narrativesByMonth[selectedMonth] || (narrativeMonth === selectedMonth ? narratives : {});
            const updateNarrative = (key, value) => {
                setNarrativeMonth(selectedMonth);
                const next = { ...activeNarratives, [key]: value };
                setNarratives(next);
                setNarrativesByMonth(prev => ({ ...prev, [selectedMonth]: next }));
            };

            const splitNarrativeBlocks = (value) => fixCommonText(value || '')
                .split(/\n\s*\n/)
                .map(block => block.trim())
                .filter(Boolean);

            const splitPlanItems = (value) => normalizePlanText(value || '')
                .split(/\n\s*\n/)
                .map(item => item.trim())
                .filter(Boolean);

            const formatTeamSlideText = (value) => fixCommonText(value || '')
                .split('\n')
                .map(line => {
                    const trimmed = line.trim();
                    if (!trimmed) return '';
                    return trimmed
                        .replace(/^\s*[•·]\s*/, '')
                        .replace(/[.。]+\s*$/, '')
                        .trim();
                })
                .join('\n');

            const getTeamSlideTextStyle = (value, baseFontSize = 24) => {
                const text = formatTeamSlideText(value || '');
                const nonEmptyLines = text.split('\n').map(line => line.trim()).filter(Boolean);
                const visualLines = nonEmptyLines.reduce((sum, line) => sum + Math.max(1, Math.ceil(line.length / 24)), 0);
                const paragraphGaps = Math.max(0, text.split(/\n\s*\n/).filter(chunk => chunk.trim()).length - 1);
                const fitScore = visualLines + paragraphGaps;
                let fontSize = baseFontSize;
                let lineHeight = baseFontSize >= 24 ? 1.9 : 2.05;

                if (fitScore > 18 || text.length > 620) {
                    fontSize = 11.5;
                    lineHeight = 1.32;
                } else if (fitScore > 15 || text.length > 500) {
                    fontSize = 13;
                    lineHeight = 1.42;
                } else if (fitScore > 12 || text.length > 380) {
                    fontSize = 15;
                    lineHeight = 1.5;
                } else if (fitScore > 9 || text.length > 260) {
                    fontSize = 18;
                    lineHeight = 1.65;
                }

                return {
                    fontSize: `${fontSize}px`,
                    lineHeight,
                    '--presentation-font-size': `${fontSize}px`,
                    '--presentation-line-height': lineHeight
                };
            };

            const PerformancePanel = ({ value, variant = 'standard', tone = 'dark', accent = '#9FE870', soft, darkGradient, title = 'Performance', className = 'flex-1' }) => {
                const blocks = splitNarrativeBlocks(value);
                const contentKey = blocks.length ? blocks.join('\n\n') : 'empty-performance';
                const { contentRef, fitStyle } = useAutoFitText({ mode: 'narrative', variant, contentKey });
                const style = {
                    ...fitStyle,
                    '--panel-accent': accent,
                    '--panel-soft': soft || '#f8fafc',
                    '--panel-dark': darkGradient || 'linear-gradient(135deg, #0d2600 0%, #163300 58%, #214f05 100%)',
                    '--panel-border': `${accent}33`
                };
                const toneClass = tone === 'dark' ? 'story-panel-dark' : 'story-panel-tinted';
                const variantClass = variant === 'regional' ? 'story-panel-regional' : '';
                return (
                    <div className={`story-panel ${toneClass} ${variantClass} ${className} shadow-2xl`} style={style}>
                        <div className="story-panel-header">
                            <h4 className="story-panel-title">{title}</h4>
                        </div>
                        <div className="story-copy">
                            <div className="story-copy-inner" ref={contentRef}>
                                {blocks.length ? blocks.map((block, index) => <p key={index}>{block}</p>) : <p>Performance notes will appear here after the report is generated.</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            const PlanPanel = ({ value, variant = 'standard', tone = 'light', accent = '#9FE870', soft = '#f5ffed', darkGradient, title = "Next Month's Plans", className = 'flex-1' }) => {
                const items = splitPlanItems(value);
                const contentKey = items.length ? items.join('\n\n') : 'empty-plan';
                const { contentRef, fitStyle } = useAutoFitText({ mode: 'plan', variant, contentKey });
                const style = {
                    ...fitStyle,
                    '--panel-accent': accent,
                    '--panel-soft': soft,
                    '--panel-dark': darkGradient || 'linear-gradient(135deg, #0d2600 0%, #163300 58%, #214f05 100%)',
                    '--panel-border': `${accent}2E`
                };
                const toneClass = tone === 'dark' ? 'story-panel-dark' : 'story-panel-light';
                return (
                    <div className={`story-panel ${toneClass} ${className} shadow-inner`} style={style}>
                        <div className="story-panel-header">
                            <h4 className="story-panel-title">{title}</h4>
                        </div>
                        <div className="plan-list">
                            <div className="plan-list-inner" ref={contentRef}>
                                {items.length ? items.map((item, index) => <p className="plan-item" key={index}>{item}</p>) : <p className="plan-empty-state">&mdash;</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            if (!setupComplete) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-wise-forest p-8">
                        <div className="bg-white/5 p-16 rounded-[4rem] shadow-2xl text-center max-w-2xl border border-white/10 backdrop-blur-sm">
                            <div className="w-28 h-28 bg-wise-fast text-wise-forest rounded-full flex items-center justify-center mx-auto mb-10 shadow-[0_0_30px_rgba(159,232,112,0.3)] animate-pulse">
                                <Icons.Upload size={56} />
                            </div>
                            <h1 className="text-5xl font-black text-wise-fast mb-10 tracking-tighter uppercase leading-none">{APP_TITLE}</h1>
                            <div className="space-y-4">
                                <input
                                    type="password"
                                    autoComplete="off"
                                    spellCheck="false"
                                    value={apiKey}
                                    onChange={e => setApiKey(e.target.value)}
                                    placeholder="API KEY"
                                    aria-label="API KEY"
                                    className="w-full bg-white/10 border border-white/10 rounded-full px-8 py-5 text-wise-fast/80 placeholder:text-wise-fast/55 outline-none font-black uppercase tracking-[0.12em] text-center focus:border-wise-fast/65 focus:bg-white/15 transition"
                                />
                                <ActionButton
                                    actionKey="report"
                                    idleLabel="Generate Report"
                                    loadingLabel="Generating Report"
                                    doneLabel="Report Generated"
                                    onClick={handleGenerateMonthlyReport}
                                    icon={<Icons.Zap size={18} />}
                                />
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-100 min-h-screen print:pb-0 pb-20">
                    <nav className="no-print sticky top-0 z-50 bg-wise-forest px-8 py-4 flex justify-between items-center border-b border-white/5">
                        <div className="flex items-center gap-4">
                            <h2 className="text-wise-fast font-black uppercase tracking-tight text-xl">{APP_TITLE}</h2>
                        </div>
                        <div className="flex items-center gap-3">
                            <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="bg-white/10 border border-white/20 text-white font-bold text-xs px-6 py-3 rounded-2xl outline-none">
                                {reportMonths.map(d => <option key={d} value={d} className="text-black">{d}</option>)}
                            </select>
                            <button onClick={handleCopySummary} className="bg-wise-fast text-wise-forest px-8 py-3 rounded-2xl font-black text-xs uppercase hover:bg-[#b9ff8a] shadow-2xl transition-transform active:scale-95">{summaryCopied ? 'Summary Copied' : 'Copy Summary'}</button>
                            <button onClick={handleExportDeck} className="bg-white text-wise-forest px-10 py-3 rounded-2xl font-black text-xs uppercase hover:bg-slate-50 shadow-2xl transition-transform active:scale-95">Export Deck</button>

                                        UPCOMING<span className="screen-title-space"> </span><br className="pdf-title-break" />PLANS
                                    </h2>
                                    <textarea
                                        className="presentation-textarea w-full max-w-[88%] h-[16rem] resize-none outline-none bg-transparent text-wise-fast text-center uppercase tracking-[0.04em] font-black placeholder:text-wise-fast/30"
                                        style={getTeamSlideTextStyle(activeNarratives['upcoming_plans'], 21)}
                                        placeholder=""
                                        value={formatTeamSlideText(activeNarratives['upcoming_plans'] || '')}
                                        onChange={e => updateNarrative('upcoming_plans', formatTeamSlideText(e.target.value))}
                                    />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Analysis End Slide */}
                        <div className="slide-container bg-wise-forest overflow-hidden relative last-slide">
                            <div className="relative z-10 w-full h-full flex flex-col justify-center items-center text-center py-8">
                                <h1 className="text-wise-fast font-black uppercase tracking-tighter opacity-100" style={{ fontSize: '8rem', lineHeight: '0.9' }}>MAHALO</h1>
                                <h1 className="text-wise-fast font-black uppercase tracking-tighter opacity-[0.85]" style={{ fontSize: '8rem', lineHeight: '0.9' }}>THANKS</h1>
                                <h1 className="text-wise-fast font-black uppercase tracking-tighter opacity-70" style={{ fontSize: '8rem', lineHeight: '0.9' }}>GRAZIE</h1>
                                <h1 className="text-wise-fast font-black uppercase tracking-tighter opacity-50" style={{ fontSize: '8rem', lineHeight: '0.9' }}>OBRIGADO</h1>
                                <h1 className="text-wise-fast font-black uppercase tracking-tighter opacity-[0.35]" style={{ fontSize: '8rem', lineHeight: '0.9' }}>BEDANKT</h1>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
