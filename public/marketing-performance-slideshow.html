                return `Paid Display exhibited significant variance across regions, with ${leaderText} leading MNC growth while ${laggardText} declined. Strategic scaling, budget allocation and creative optimization remained the key themes across markets.`;
            };

            const extractThemeSentence = (targets, sourceNarratives = narratives, reportContext = currentReportContext) => {
                const targetKeys = targets.map(t => t.toLowerCase());
                const notes = reportContext?.reportData?.regions?.flatMap(r => splitNotes(sourceNarratives[`${r.name}_perf`] || '')) || [];
                const storyNotes = notes.filter(note => !/\b(concluded in|with a total spend|resulted in a payback|drove [\d,.]+ MNCs|at a [\d.]+-month payback)\b/i.test(note));
                return storyNotes.find(note => targetKeys.some(key => note.toLowerCase().includes(key))) || storyNotes[0] || '';
            };

            const joinStoryParagraph = (parts) => parts
                .filter(Boolean)
                .join(' ')
                .replace(/\s+/g, ' ')
                .trim()
                .replace(/([^.!?])$/, '$1.');

            const buildPlatformSummary = (platformName, defaultText, aliases, sourceNarratives = narratives, reportContext = currentReportContext) => {
                const platformDisplayName = getPlatformMeta(platformName)?.narrativeName || platformName;
                const platformRows = (reportContext?.reportData?.regions || [])
                    .map(r => ({ region: r.name, ...(r.platformStats.find(p => p.name === platformName) || {}) }))
                    .filter(p => p.mncs > 0);
                const growthLeader = [...platformRows].sort((a, b) => (b.shifts?.mom?.mncs || 0) - (a.shifts?.mom?.mncs || 0))[0];
                const bestPayback = [...platformRows].sort((a, b) => (a.payback || 99) - (b.payback || 99))[0];
                const theme = extractThemeSentence(aliases, sourceNarratives, reportContext);
                const laggard = [...platformRows].sort((a, b) => (a.shifts?.mom?.mncs || 0) - (b.shifts?.mom?.mncs || 0))[0];
                const growthText = growthLeader ? `${platformDisplayName} showed varied results across regions, with notable growth in ${growthLeader.region} where MNCs moved ${growthLeader.shifts?.mom?.mncs > 0 ? '+' : ''}${((growthLeader.shifts?.mom?.mncs || 0) * 100).toFixed(1)}% MoM.` : '';
                const laggardText = laggard && laggard !== growthLeader ? `${laggard.region} was softer at ${laggard.shifts?.mom?.mncs > 0 ? '+' : ''}${((laggard.shifts?.mom?.mncs || 0) * 100).toFixed(1)}% MoM.` : '';
                const paybackText = bestPayback ? `${bestPayback.region} was the most efficient tracked region for the platform at a ${bestPayback.payback.toFixed(1)}-month payback.` : '';
                return [defaultText, joinStoryParagraph([growthText, laggardText, paybackText, theme])].filter(Boolean).join('\n\n');
            };

            const buildLocalMonthlySummaries = (sourceNarratives = narratives, reportContext = currentReportContext) => ({
                GLOBAL_perf: [
                    reportContext?.defaultGlobalPerfText || '',
                    joinStoryParagraph([
                        describeRegionalVariance(reportContext),
                        extractThemeSentence(['scaling', 'incrementality', 'test', 'creative', 'budget', 'payback'], sourceNarratives, reportContext)
                    ])
                ].filter(Boolean).join('\n\n'),
                GLOBAL_plan: collectPlanLines([], sourceNarratives, reportContext),
                GAC_perf: buildPlatformSummary('Google AC', reportContext?.defaultGACPerfText || '', ['google ac', 'gac'], sourceNarratives, reportContext),
                GAC_plan: collectPlanLines(['google', 'gac'], sourceNarratives, reportContext),
                MOLOCO_perf: buildPlatformSummary('Moloco', reportContext?.defaultMolocoPerfText || '', ['moloco'], sourceNarratives, reportContext),
                MOLOCO_plan: collectPlanLines(['moloco'], sourceNarratives, reportContext),
                TTD_perf: buildPlatformSummary('TTD', reportContext?.defaultTTDPerfText || '', ['ttd', 'trade desk', 'video', 'programmatic'], sourceNarratives, reportContext),
                TTD_plan: collectPlanLines(['ttd', 'trade desk', 'video', 'programmatic'], sourceNarratives, reportContext)
            });

            const buildAISummaryPayload = (sourceNarratives, reportContext = currentReportContext) => ({
                month: formatCoverDate(reportContext?.monthValue || selectedMonth),
                global: {
                    kpiRecap: reportContext?.defaultGlobalPerfText || '',
                    stats: reportContext.reportData.global.stats,
                    shifts: reportContext.reportData.global.shifts,
                    platformStats: reportContext.reportData.global.platformStats,
                    planCandidates: collectPlanLines([], sourceNarratives, reportContext)
                },
                platforms: PLATFORM_SEQUENCE.map(meta => {
                    const platformGlobal = reportContext.reportData.global.platformStats.find(platform => platform.name === meta.statName);
                    return {
                        key: meta.key,
                        name: meta.narrativeName,
                        kpiRecap: getBasePerformanceForTarget(meta.key, reportContext),
                        stats: platformGlobal,
                        planCandidates: collectPlanLines([meta.statName, meta.key, meta.narrativeName], sourceNarratives, reportContext),
                        regions: reportContext.reportData.regions.map(region => ({
                            name: region.name,
                            stats: region.platformStats.find(platform => platform.name === meta.statName),
                            regionalPerformanceNotes: sourceNarratives[`${region.name}_perf`] || getRegionalPerformanceBase(region, {}, reportContext),
                            regionalNextMonthPlans: sourceNarratives[`${region.name}_plan`] || ''
                        }))
                    };
                }),
                regions: reportContext.reportData.regions.map(region => ({
                    name: region.name,
                    stats: region.stats,
                    shifts: region.shifts,
                    platformStats: region.platformStats,
                    performanceNotes: sourceNarratives[`${region.name}_perf`] || getRegionalPerformanceBase(region, {}, reportContext),
                    nextMonthPlans: sourceNarratives[`${region.name}_plan`] || ''
                }))
            });

            const generateOpenAISummaries = async (sourceNarratives, reportContext = currentReportContext) => {
                const trimmedApiKey = apiKey.trim();
                if (!trimmedApiKey) throw new Error('Paste the API KEY before generating the monthly report.');

Performance paragraph 2: concise strategic explanation of the story behind the numbers. Mention named regions and the operational levers from the source notes: scaling, tests, budget control, creative changes, targeting shifts, payback/LTV implications.

DATA:
${JSON.stringify(buildAISummaryPayload(sourceNarratives, reportContext))}`
