    <script type="text/babel" data-type="module" data-presets="env" data-plugins="transform-react-jsx">
        const { useState, useMemo, useEffect } = React;

        // --- CONFIG & UTILS ---
        const APP_TITLE = 'Paid Display Monthly Performance';
        const LIGHTDASH_SHEET_ID = '1IOER5fHYosm7ZMLAqDd0RTWFL8om0lm9emelSwxCWvM';
        const PERFORMANCE_UPDATES_SHEET_ID = '15dr8wUNqMtE3VlQOHpczIbEWRk2z2sfpbwNWW8QVOYg';
        const APPS_SCRIPT_DATA_BRIDGE_URL = 'https://script.google.com/a/macros/wise.com/s/AKfycbyhHkA6OiR_5dA_dQXGDFNdm4RL10BVQMLUutiVpiH7Amp05Qj3lVI7N5eH501rMPJy/exec';
        const LOCAL_LIGHTDASH_CSV = 'data/lightdash.csv';
        const LOCAL_PERFORMANCE_UPDATES_CSV = 'data/performance-updates.csv';
        const OPENAI_SUMMARY_TIMEOUT_MS = 90000;
        const SUMMARY_GENERATION_CONCURRENCY = 3;
        const REGIONS = ['LATAM', 'NORTHAM', 'EUROPE', 'ASIA', 'PACIFIC', 'GBR', 'MEA'];
        const PLATFORM_SEQUENCE = [
            { key: 'GAC', statName: 'Google AC', displayName: 'Google AC', narrativeName: 'Google AC', logoUrl: './assets/google-ac-logo.png', fallback: 'G' },
            { key: 'MOLOCO', statName: 'Moloco', displayName: 'Moloco', narrativeName: 'Moloco', logoUrl: './assets/moloco-logo.png', fallback: 'M' },
            { key: 'TTD', statName: 'TTD', displayName: 'The Trade Desk', narrativeName: 'The Trade Desk', logoUrl: './assets/the-trade-desk-logo.png', fallback: 'TTD' },
            { key: 'AVOW', statName: 'Avow', displayName: 'Avow', narrativeName: 'Avow', fallback: 'A' }
        ];
        const CORE_PLATFORM_SEQUENCE = PLATFORM_SEQUENCE.filter(platform => platform.key !== 'AVOW');
        const REGIONAL_NARRATIVE_SEQUENCE = [PLATFORM_SEQUENCE[0], PLATFORM_SEQUENCE[2], PLATFORM_SEQUENCE[1]];
        const OVERALL_PLATFORMS_UI = PLATFORM_SEQUENCE.map(platform => platform.statName);
        const CORE_PLATFORMS_UI = CORE_PLATFORM_SEQUENCE.map(platform => platform.statName);
        const PLATFORM_THEMES = {
            GAC: { accent: '#FFA500', soft: '#fff8eb', muted: '#f59e0b' },
            MOLOCO: { accent: '#2C7CF5', soft: '#eef5ff', muted: '#2563eb' },
            TTD: { accent: '#1d9ad6', soft: '#ecf7fd', muted: '#0284c7' },
            AVOW: { accent: '#7c3aed', soft: '#f5f3ff', muted: '#6d28d9' }
        };
        const PLATFORM_PANEL_TONES = {
            GAC: {
                regionGradient: 'linear-gradient(135deg, #ffe9c6 0%, #fff4e2 54%, #ffffff 100%)',
                metricGradient: 'linear-gradient(135deg, #fff1d6 0%, #fff8ec 58%, #ffffff 100%)',
                darkGradient: 'linear-gradient(135deg, #d46f00 0%, #f59b00 58%, #ffb238 100%)',
                performanceSoft: '#fff3df',
                plansSoft: '#fffaf2',
                border: '#FFB23826'
            },
            MOLOCO: {
                regionGradient: 'linear-gradient(135deg, #deecff 0%, #f0f7ff 52%, #ffffff 100%)',
                metricGradient: 'linear-gradient(135deg, #e4f0ff 0%, #f2f8ff 56%, #ffffff 100%)',
                darkGradient: 'linear-gradient(135deg, #082a63 0%, #155fd0 55%, #2C7CF5 100%)',
                performanceSoft: '#edf5ff',
                plansSoft: '#fbfdff',
                border: '#2C7CF533'
            },
            TTD: {
                regionGradient: 'linear-gradient(135deg, #d8f3ff 0%, #eefaff 52%, #ffffff 100%)',
                metricGradient: 'linear-gradient(135deg, #dff6ff 0%, #f0fbff 56%, #ffffff 100%)',
                darkGradient: 'linear-gradient(135deg, #043044 0%, #0b78ac 55%, #1d9ad6 100%)',
                performanceSoft: '#eaf9ff',
                plansSoft: '#fbfeff',
                border: '#1d9ad633'
            },
            AVOW: {
                regionGradient: 'linear-gradient(135deg, #e8e0ff 0%, #f4f0ff 52%, #ffffff 100%)',
                metricGradient: 'linear-gradient(135deg, #eee7ff 0%, #f7f3ff 56%, #ffffff 100%)',
                darkGradient: 'linear-gradient(135deg, #35156f 0%, #6230c6 55%, #7c3aed 100%)',
                performanceSoft: '#f4f0ff',
                plansSoft: '#fcfbff',
                border: '#7c3aed33'
            }
        };
        const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const REGION_SLACK_FLAGS = {
            LATAM: ':flag-br:',
            NORTHAM: ':us:',
            EUROPE: ':flag-eu:',
            ASIA: ':flag-my:',
            PACIFIC: ':aus:',
            GBR: ':flag-gb:',
            MEA: ':flag-tr:'
        };

        const safeNum = (v) => {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            const n = parseFloat(String(v).replace(/[^\d.-]/g, ''));
            return isNaN(n) ? 0 : n;
        };

        const fmtCurr = (v) => new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', minimumFractionDigits: 0 }).format(v);
        const fmtCompactNum = (v) => Intl.NumberFormat('en-GB', { notation: "compact", maximumFractionDigits: 1 }).format(v).toLowerCase();
        const fmtCompactCurr = (v) => "£" + Intl.NumberFormat('en-GB', { notation: "compact", maximumFractionDigits: 1 }).format(v).toLowerCase();
        
        const getMoName = (d) => {
            if (!d || d === "No Date") return "Performance Cycle";
            const parts = d.split('-');
            return parts.length > 1 ? MONTHS[parseInt(parts[1]) - 1] : d;
        };

        const formatCoverDate = (d) => {
            if (!d || d === "No Date") return "Performance Cycle";
            const parts = d.split('-');
            if (parts.length >= 2) {
                let yr = parts[0].length === 4 ? parts[0] : (parts[1].length === 4 ? parts[1] : '2026');
                let moIdx = parts[0].length === 4 ? parseInt(parts[1]) - 1 : parseInt(parts[0]) - 1;
                if (!isNaN(moIdx) && moIdx >= 0 && moIdx < 12) {
                    return `${MONTHS[moIdx].substring(0, 3)} ${yr}`;
                }
            }
            return d.length > 3 ? d.substring(0, 3) + " 2026" : d;
        };

        const getMonthParts = (d) => {
            if (!d || d === "No Date") return null;
            const parts = String(d).split('-');
            if (parts.length < 2) return null;
            const yr = parts[0].length === 4 ? parseInt(parts[0], 10) : parseInt(parts[1], 10);
            const mo = parts[0].length === 4 ? parseInt(parts[1], 10) : parseInt(parts[0], 10);
            if (!yr || !mo || mo < 1 || mo > 12) return null;
            return { year: yr, monthIndex: mo - 1 };
        };

        const formatFullMonthYear = (d) => {
            const parts = getMonthParts(d);
            return parts ? `${MONTHS[parts.monthIndex]} ${parts.year}` : formatCoverDate(d);
        };

        const formatNextFullMonthYear = (d) => {
            const parts = getMonthParts(d);
            if (!parts) return 'Next Month';
            const nextIndex = (parts.monthIndex + 1) % 12;
            const nextYear = parts.monthIndex === 11 ? parts.year + 1 : parts.year;
            return `${MONTHS[nextIndex]} ${nextYear}`;
        };

        const formatSlackRegionMncs = (value) => {
            const n = safeNum(value);
            if (n >= 10000) return `${(n / 1000).toFixed(1).replace(/\.0$/, '')}k`;
            return Math.round(n).toLocaleString();
        };

        const getRegionSubtitle = (region) => {
            const map = {
                'LATAM': '🇧🇷',
                'NORTHAM': '🇺🇸 🇨🇦',
                'EUROPE': '🇪🇺',
                'ASIA': '🇲🇾 🇸🇬 🇯🇵 🇮🇩 🇵🇭',
                'PACIFIC': '🇦🇺 🇳🇿',
                'GBR': '🇬🇧',
                'MEA': '🇹🇷'
            };
            return map[region] || '';
        };

        const normalizePlatformLookup = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');

        const getPlatformMeta = (value) => {
            const key = normalizePlatformLookup(value);
            if (!key) return null;
            if (key.includes('gac') || key.includes('google') || key.includes('appcampaign')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'GAC');
            if (key.includes('ttd') || key.includes('tradedesk')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'TTD');
            if (key.includes('moloco')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'MOLOCO');
            if (key.includes('avow')) return PLATFORM_SEQUENCE.find(platform => platform.key === 'AVOW');
            return PLATFORM_SEQUENCE.find(platform => normalizePlatformLookup(platform.statName) === key || platform.key.toLowerCase() === key) || null;
        };

        const getPlatformTheme = (value) => {
            const meta = getPlatformMeta(value);
            return PLATFORM_THEMES[meta?.key] || { accent: '#163300', soft: '#f8fafc', muted: '#475569' };
        };

        const getPlatformPanelTone = (value) => {
            const meta = getPlatformMeta(value);
            return PLATFORM_PANEL_TONES[meta?.key] || {
                regionGradient: 'linear-gradient(135deg, #eef5ea 0%, #f7fbf5 55%, #ffffff 100%)',
                metricGradient: 'linear-gradient(135deg, #eef5ea 0%, #f7fbf5 55%, #ffffff 100%)',
                darkGradient: 'linear-gradient(135deg, #0d2600 0%, #163300 58%, #214f05 100%)',
                performanceSoft: '#f3f8f0',
                plansSoft: '#fbfdf9',
                border: 'rgba(22, 51, 0, 0.16)'
            };
        };

        const getPlatformMetricCardStyle = (value) => {
            const tone = getPlatformPanelTone(value);
            return {
                background: tone.metricGradient,
                borderColor: tone.border
            };
        };

        const parseCSVRows = (text, delimiter) => {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { field += '"'; i++; }
                    else if (char === '"') inQuotes = false;
                    else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === delimiter) { row.push(field); field = ''; }
                    else if (char === '\n' || char === '\r') {
                        row.push(field);
                        if (row.some(c => c.trim() !== '')) rows.push(row);
                        row = []; field = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else field += char;
                }
            }
            if (field || row.length > 0) { row.push(field); rows.push(row); }
            return rows;
        };

        const formatSheetValue = (value, formattedValue) => {
            if (value instanceof Date && !isNaN(value)) {
                const y = value.getFullYear();
                const m = String(value.getMonth() + 1).padStart(2, '0');
                const d = String(value.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            if (value === null || value === undefined) return '';

            return value;

        const escapeCSV = (value) => {

            const monthsParam = monthValues.length ? `&months=${encodeURIComponent(monthValues.join(','))}` : '';
            const timeout = window.setTimeout(() => {
                cleanup();
                reject(new Error('The Wise data bridge did not respond. Check that you are signed into your Wise Google account and that the Apps Script deployment is active.'));
            }, 20000);

            const cleanup = () => {
                window.clearTimeout(timeout);
                delete window[callbackName];
                script.remove();
            };

            window[callbackName] = (response) => {
                cleanup();
                if (!response || !response.ok) {
                    const details = response?.error || 'The Wise data bridge returned an error.';
                    reject(new Error(details));
                    return;
                }
                resolve(response);
            };

            script.onerror = () => {
                cleanup();
                reject(new Error('The Wise data bridge could not be loaded. Open the Apps Script URL in this browser once and confirm you are signed into Wise Google.'));
            };

            script.src = `${APPS_SCRIPT_DATA_BRIDGE_URL}?${sourceParam}&${callbackParam}${sheetParam}${allTabsParam}${monthsParam}`;
            document.head.appendChild(script);
        });

        const loadGoogleSheetRows = async (spreadsheetId, sheetName) => {

        const loadLocalCSVRows = async (path) => {

                : (path === LOCAL_PERFORMANCE_UPDATES_CSV ? window.WISE_CACHED_PERFORMANCE_UPDATES_CSV : null);
            if (embedded) {
                const firstLine = embedded.split(/\r?\n/).find(line => line.trim()) || '';
                const delimiter = firstLine.includes(';') ? ';' : ',';
                return parseCSVRows(embedded.replace(/^\uFEFF/, ''), delimiter);
            }
            const response = await fetch(`${path}?v=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) throw new Error(`Could not load ${path}.`);
            const text = (await response.text()).replace(/^\uFEFF/, '');
            const firstLine = text.split(/\r?\n/).find(line => line.trim()) || '';
            const delimiter = firstLine.includes(';') ? ';' : ',';
            return parseCSVRows(text, delimiter);
        };

        const PlatformLogo = ({ platform, size = 'medium', className = '' }) => {

        const MetricCard = ({ title, val, mom, yoy, inverse = false, rawVal, mainColor = 'text-slate-950', labelColor = 'text-wise-forest/70', cardStyle = null }) => {

        const MiniTrend = ({ data, color = "#6366f1", height = 40 }) => {

            const max = Math.max(...data, 1);
            const points = data.map((v, i) => `${(i / (data.length - 1)) * 100},${height - (v / max) * height}`).join(' ');
            return (
                <svg width="100%" height={height} className="overflow-visible">
                    <polyline points={points} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />

        function App() {
            const [rawData, setRawData] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState('');
            const [narratives, setNarratives] = useState({});
            const [narrativesByMonth, setNarrativesByMonth] = useState({});
            const [performanceRowsByMonth, setPerformanceRowsByMonth] = useState({});
            const [performanceTabsByMonth, setPerformanceTabsByMonth] = useState({});
            const [narrativeMonth, setNarrativeMonth] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [headers, setHeaders] = useState([]);
            const [setupComplete, setSetupComplete] = useState(false);
            const [apiKey, setApiKey] = useState('');
            const [summaryCopied, setSummaryCopied] = useState(false);
            const [actionState, setActionState] = useState({
                lightdash: { status: 'idle', progress: 0, message: '' },
                updates: { status: 'idle', progress: 0, message: '' },
                report: { status: 'idle', progress: 0, message: '' }
            });
            const reportMonths = useMemo(() => [...new Set(rawData.map(d => d.date))].sort().reverse(), [rawData]);

            const renderPlatformPct = (val, metricType, currVal) => {
                if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
                const isPos = val > 0;
                let good = isPos; 
                
                if (metricType === 'spend') good = isPos; 
                if (metricType === 'cm') good = isPos; 
                if (metricType === 'cpa') good = !isPos; 
                if (metricType === 'ltv') good = isPos; 
                if (metricType === 'payback') {
                    const prev = currVal / (1 + val);
                    good = Math.abs(currVal - 15) < Math.abs(prev - 15);
                }
                
                const color = good ? 'text-green-600' : 'text-[#d32f2f]';
                return (
                    <div className={`flex flex-col items-end leading-tight ${color}`}>
                        <span className="text-[10px] font-black">{isPos ? '+' : ''}{(val * 100).toFixed(1)}%</span>
                    </div>
                );
            };

            const renderTablePct = (val, metricType, currVal) => {
                if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
                const isPos = val > 0;
                let good = isPos; 
                
                if (metricType === 'spend') good = isPos; 
                if (metricType === 'cm') good = isPos; 
                if (metricType === 'cpa') good = !isPos; 
                if (metricType === 'ltv') good = isPos; 
                if (metricType === 'payback') {
                    const prev = currVal / (1 + val);
                    good = Math.abs(currVal - 15) < Math.abs(prev - 15);
                }
                
                const color = good ? 'text-green-600' : 'text-[#d32f2f]';
                return (
                    <span className={`text-[10px] font-black ${color}`}>{isPos ? '+' : ''}{(val * 100).toFixed(1)}%</span>
                );
            };

            const processCSVText = (csvText) => {
                try {
                    let text = csvText.replace(/^\uFEFF/, '');
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    const delimiter = lines[0].includes(';') ? ';' : ',';
                    const rawRows = parseCSVRows(text, delimiter);
                    
                    const mappedHeaders = rawRows[0].map(h => {
                        const clean = (h || "").trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                        if (clean.includes('month') || clean.includes('date')) return 'date';
                        if (clean.includes('region') && !clean.includes('country')) return 'region';
                        if (clean.includes('platform') || clean.includes('vendor') || clean.includes('source')) return 'platform';
                        if (clean.includes('country') || clean.includes('market') || clean.includes('entity') || clean.includes('location') || clean.includes('alpha2') || clean.includes('iso')) return 'country';
                        if (clean.includes('mncs') || clean.includes('deposit') || clean.includes('acq') || clean.includes('conv')) return 'mncs';
                        if (clean.includes('spend') || clean.includes('cost') || clean.includes('invest')) return 'spend';
                        if (clean.includes('payback')) return 'payback';
                        if (clean.includes('ltv')) return 'ltv';
                        if (clean.includes('regs') || clean.includes('regist')) return 'regs';
                        if (clean === 'cm' || clean.includes('internalmeasurescm') || clean.includes('interanlmeasurescm') || clean.includes('contributionmargin') || clean.endsWith('cm') || clean.includes('masterreportcm')) return 'cm';
                        return clean;
                    });
                    setHeaders(mappedHeaders);
                    const finalData = rawRows.slice(1).map(row => {
                        const obj = {};
                        mappedHeaders.forEach((h, i) => {
                            let v = (row[i] || "").trim();
                            if (h === 'platform') {
                                const p = v.toLowerCase();
                                if (p.includes('google')) v = 'Google AC';
                                else if (p.includes('moloco')) v = 'Moloco';
                                else if (p.includes('trade') || p.includes('ttd')) v = 'TTD';
                                else if (p.includes('avow')) v = 'Avow';
                            }
                            obj[h] = v;
                        });
                        if (!obj.date) obj.date = "No Date";
                        if (obj.region) obj.region = obj.region.toUpperCase().replace(/\s/g, '');
                        return obj;
                    });
                    setRawData(finalData);
                    const dates = [...new Set(finalData.map(r => r.date))].sort().reverse();
                    setSelectedMonth(dates[0] || "No Date");
                    setNarratives({});
                    setNarrativesByMonth({});
                    setPerformanceRowsByMonth({});
                    setPerformanceTabsByMonth({});
                    setNarrativeMonth('');
                    return finalData;
                } catch (err) {
                    console.error(err);
                    throw err;
                }
            };

            const processFile = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        processCSVText(ev.target.result);
                        setSetupComplete(true);
                    } catch (err) {
                        console.error(err);
                    }
                };
                reader.readAsText(file);
            };

            const updateAction = (key, patch) => {
                setActionState(prev => ({
                    ...prev,
                    [key]: { ...prev[key], ...patch }
                }));
            };

            const runActionWithProgress = async (key, work) => {
                const startedAt = Date.now();
                const minimumVisibleMs = 1200;
                const finishAfterMinimum = () => new Promise(resolve => {
                    window.setTimeout(resolve, Math.max(0, minimumVisibleMs - (Date.now() - startedAt)));
                });
                const setProgress = (progress, message = '') => {
                    updateAction(key, {
                        status: 'loading',
                        progress: Math.max(1, Math.min(99, Math.round(progress))),
                        ...(message ? { message } : {})
                    });
                };

                updateAction(key, { status: 'loading', progress: 1, message: '' });
                const interval = window.setInterval(() => {
                    setActionState(prev => {
                        const current = prev[key];
                        if (current.status !== 'loading') return prev;
                        return {
                            ...prev,
                            [key]: {
                                ...current,
                                progress: Math.min(96, current.progress + 1)
                            }
                        };
                    });
                }, 350);

                try {
                    const message = await work(setProgress);
                    await finishAfterMinimum();
                    window.clearInterval(interval);
                    updateAction(key, { status: 'done', progress: 100, message: message || '' });
                    return true;
                } catch (err) {
                    await finishAfterMinimum();
                    window.clearInterval(interval);
                    console.error(err);
                    updateAction(key, { status: 'error', progress: 0, message: err.message || 'Something went wrong. Please try again.' });
                    return false;
                }
            };

            const getReportYear = (dateValue) => {
                const match = String(dateValue || '').match(/\b(20\d{2})\b/);
                return match ? match[1] : new Date().getFullYear();
            };

            const getPerformanceUpdateTabName = (monthValue = selectedMonth) => {
                if (monthValue && monthValue !== 'No Date') {
                    const monthName = getMoName(monthValue);
                    return /\b20\d{2}\b/.test(monthName) ? monthName : `${monthName} ${getReportYear(monthValue)}`;
                }
                const previousMonth = new Date();
                previousMonth.setMonth(previousMonth.getMonth() - 1);
                return `${MONTHS[previousMonth.getMonth()]} ${previousMonth.getFullYear()}`;
            };

            const getPerformanceUpdateTabCandidates = (monthValue = selectedMonth) => {
                const primary = getPerformanceUpdateTabName(monthValue);
                const year = getReportYear(monthValue);
                const monthName = monthValue && monthValue !== 'No Date' ? getMoName(monthValue) : primary.split(' ')[0];
                const monthIndex = MONTHS.findIndex(month => month.toLowerCase() === String(monthName).toLowerCase()) + 1;
                const paddedMonth = monthIndex ? String(monthIndex).padStart(2, '0') : '';
                const shortYear = String(year).slice(-2);
                const shortMonth = String(monthName || '').slice(0, 3);

                    `${shortMonth} ${year}`,

                    paddedMonth ? `${paddedMonth}-${year}` : '',

                ].map(value => String(value || '').trim()).filter(Boolean))];

            const loadPerformanceUpdateRows = async (monthValue = selectedMonth) => {
                const candidates = getPerformanceUpdateTabCandidates(monthValue);
                const errors = [];

                    try {
                        const result = await loadRowsFromGoogleOrCache(PERFORMANCE_UPDATES_SHEET_ID, tabName, null);

                        errors.push(`${tabName}: ${err.message}`);

                }
                throw new Error(`Could not find a Performance Updates tab for ${getPerformanceUpdateTabName(monthValue)}. Tried: ${candidates.join(', ')}.`);
            };

            const normalizeBridgeTabs = (tabs) => {
                if (Array.isArray(tabs)) {
                    return tabs
                        .map(tab => ({
                            name: String(tab.name || tab.title || tab.sheetName || tab.tabName || '').trim(),
                            matchedMonth: String(tab.matchedMonth || tab.month || tab.monthValue || '').trim(),
                            rows: tab.rows || []
                        }))
                        .filter(tab => tab.name && Array.isArray(tab.rows));
                }
                if (tabs && typeof tabs === 'object') {
                    return Object.entries(tabs)
                        .map(([name, rows]) => ({ name: String(name || '').trim(), rows }))
                        .filter(tab => tab.name && Array.isArray(tab.rows));
                }
                return [];
            };

            const loadAllPerformanceUpdateTabs = async (months = []) => {
                const payload = await loadBridgePayload(PERFORMANCE_UPDATES_SHEET_ID, { allTabs: true, months });
                const tabs = normalizeBridgeTabs(payload.tabs || payload.sheets || payload.sheetTabs);
                if (!tabs.length) throw new Error('The Wise data bridge did not return Performance Updates tabs.');
                return { source: 'Wise data bridge', tabs };

            const findPerformanceTabForMonth = (tabs, monthValue) => {
                const candidateKeys = getPerformanceUpdateTabCandidates(monthValue).map(normalizeKey);
